<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIBVANIA ONLINE - ÁREA DO BIBLIOTECÁRIO</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <style>
        .tab-content { display: none !important; }
        .tab-content.active { display: block !important; }
        
        .school-header-edit {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        
        .edit-school-btn {
            background: var(--primary);
            border: none;
            color: white;
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            overflow-y: auto;
        }

        .modal-content {
            background: var(--card);
            width: 100%;
            max-width: 500px;
            border-radius: var(--radius);
            padding: 1.5rem;
            max-height: 90vh;
            overflow-y: auto;
        }

        .loan-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .btn-small {
            padding: 0.4rem 0.6rem;
            font-size: 0.7rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="accessibility-bar">
        <button class="control-btn" onclick="window.open('https://github.com/ruanolima/BibVania', '_blank')" style="flex-grow:1; text-align:left;">📁 Repositório</button>
        <button class="control-btn" onclick="changeFontSize(1)">A+</button>
        <button class="control-btn" onclick="changeFontSize(-1)">A-</button>
        <button class="control-btn" onclick="toggleDarkMode()" id="darkModeBtn">🌙</button>
    </div>

<header>
        <img src="logo.png" alt="Logo BibVania" class="header-logo">
        <h1>ÁREA DO BIBLIOTECÁRIO</h1>
        <div class="school-name" id="nomeEscolaAdmin"><span>BIBLIOTECA ESCOLAR DA EMTI</span><span>PROFESSORA MARIA VÂNIA FARIAS LINHARES</span></div>
    </header>

    <div class="container">
        <nav style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
            <button onclick="window.location.href='index.html'" class="btn-outline" style="min-width: auto;"><span>👥</span> LEITORES</button>
            <button onclick="window.location.href='relatorios.html'" class="btn-outline" style="min-width: auto;"><span>📊</span> RELATÓRIOS</button>
            <button onclick="window.DB.signOut()" class="btn-danger" style="grid-column: span 2; min-width: auto;">SAIR DO SISTEMA</button>
        </nav>

        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab(event, 'tab-cadastro')">CADASTRO</button>
            <button class="tab-btn" onclick="switchTab(event, 'tab-emprestimo')">EMPRÉSTIMO</button>
            <button class="tab-btn" onclick="switchTab(event, 'tab-registro')">ACERVO</button>
            <button class="tab-btn" onclick="switchTab(event, 'tab-devolucoes'); carregarDevolucoes()">DEVOLUÇÕES</button>
        </div>

        <!-- TAB: CADASTRO -->
        <div id="tab-cadastro" class="tab-content active">
            <div class="card">
                <h2><span>➕</span> NOVO LIVRO</h2>
                <form id="formLivro">
                    <div class="form-group"><label>ISBN (OPCIONAL)</label><input type="text" id="isbn"></div>
                    <div class="form-group"><label>ACABAMENTO</label><select id="acabamento"><option value=""></option><option value="GRAMPEADO">GRAMPEADO</option><option value="ESPIRAL">ESPIRAL</option><option value="BROCHURA">BROCHURA</option><option value="CAPA DURA">CAPA DURA</option></select></div>
                    <div class="form-group"><label>TÍTULO DO LIVRO *</label><input type="text" id="titulo" required></div>
                    <div class="form-group"><label>AUTOR (OPCIONAL)</label><input type="text" id="autor"></div>
                    
                    <!-- COLABORADORES -->
                    <div class="form-group full-width" id="colaboradoresContainer">
                        <div id="listaColaboradores"></div>
                        <button type="button" onclick="adicionarColaborador()" class="btn-block btn-outline" style="margin-top:0.5rem; font-size:0.8rem; padding:0.6rem;">+ ADICIONAR COLABORADOR</button>
                    </div>

                    <div class="form-group"><label>EDITORA (OPCIONAL)</label><input type="text" id="editora"></div>
                    <div class="form-group">
                        <label class="checkbox-container" id="labelPubIndependente" style="margin-top:0.25rem;">
                            <input type="checkbox" id="pubIndependente" onchange="togglePubIndependente(this, 'editora')">
                            PUBLICAÇÃO INDEPENDENTE
                        </label>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr auto; gap:0.75rem; align-items:end;">
                        <div class="form-group" style="margin-bottom:0;"><label>CATEGORIA *</label><select id="categoria" required></select></div>
                        <div class="form-group" style="margin-bottom:0;"><label>PRATELEIRA *</label><input type="text" id="prateleira" style="width:56px; text-align:center; text-transform:uppercase;" maxlength="2" pattern="[A-Za-z][0-9]" title="Uma letra seguida de um número (ex: C3)" required></div>
                    </div>
                    <div class="form-group"><label>QUANTIDADE TOTAL *</label><input type="number" id="quantidade" min="1" required></div>
                    <div class="form-group full-width"><label>SINOPSE (OPCIONAL)</label><textarea id="sinopse" rows="3"></textarea></div>
                    <!-- CAPA DO LIVRO -->
                    <div class="form-group full-width">
                        <label>CAPA DO LIVRO (OPCIONAL)</label>
                        <div style="display:flex; gap:1rem; align-items:flex-start; margin-top:0.5rem;">
                            <div class="book-cover-wrap">
                                <img id="capaPreview" src="logo.png" alt="Capa" class="cover-placeholder">
                            </div>
                            <div style="display:flex; flex-direction:column; gap:0.5rem; justify-content:center;">
                                <div id="capaBtns">
                                    <button type="button" class="btn-block btn-outline" style="font-size:0.8rem; padding:0.5rem 0.75rem;"
                                        onclick="document.getElementById('capaInput').click()">📷 ESCOLHER IMAGEM</button>
                                    <input type="file" id="capaInput" accept="image/*" style="display:none;"
                                        onchange="preVisualizarCapa(this,'capaPreview','capaBtns',false)">
                                </div>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn-block btn-primary">CADASTRAR LIVRO</button>
                </form>
                <div id="msgLivro" style="margin-top:1rem; text-align:center; font-weight:bold; font-size:0.8rem;"></div>
            </div>
        </div>

        <!-- TAB: EMPRÉSTIMO -->
        <div id="tab-emprestimo" class="tab-content">
            <div class="card">
                <h2><span>📖</span> REGISTRAR SAÍDA</h2>
                <form id="formEmprestimo">
                    <div class="form-group full-width">
                        <label class="checkbox-container" id="labelProfessor">
                            <input type="checkbox" id="ehProfessor" onchange="toggleTipoPessoa()">
                            PROFESSOR / FUNCIONÁRIO
                        </label>
                    </div>
                    <div class="form-group full-width" style="position: relative;">
                        <label>BUSCAR LIVRO *</label>
                        <input type="text" id="livroSearch" placeholder="DIGITE O TÍTULO OU ID..." required>
                        <input type="hidden" id="livroId">
                        <div id="sugestoes" class="card" style="display:none; position:absolute; top:100%; left:0; right:0; z-index:100; padding:0.5rem; max-height:200px; overflow-y:auto;"></div>
                    </div>
                    
                    <div id="camposAluno" style="display:contents;">
                        <div class="form-group"><label>NOME DO ALUNO *</label><input type="text" id="nomeAluno"></div>
                        <div class="form-group">
                            <label>SEXO *</label>
                            <select id="sexo">
                                <option value="">SELECIONE</option>
                                <option value="M">ALUNO</option>
                                <option value="F">ALUNA</option>
                            </select>
                        </div>
                        <div class="form-group"><label>ANO *</label><input type="number" id="ano" min="1" max="9"></div>
                        <div class="form-group"><label>TURMA *</label><input type="text" id="turma"></div>
                    </div>

                <div id="camposProfessor" style="display:none;">
                    <div class="form-group"><label>NOME DO PROFESSOR/FUNCIONÁRIO *</label><input type="text" id="nomeProfessor"></div>
                    <div class="form-group">
                        <label>SEXO *</label>
                        <select id="sexoProfessor">
                            <option value="">SELECIONE</option>
                            <option value="M">FUNCIONÁRIO</option>
                            <option value="F">FUNCIONÁRIA</option>
                        </select>
                    </div>
                </div>

                    <div class="form-group">
                        <label>DIAS DE EMPRÉSTIMO *</label>
                        <input type="number" id="dias" min="1" value="7">
                    </div>
                    <div class="form-group">
                        <label class="checkbox-container" id="labelSemData" style="margin-top:1.5rem;">
                            <input type="checkbox" id="semData" onchange="toggleData()">
                            SEM DATA DEFINIDA
                        </label>
                    </div>
                    <button type="submit" class="btn-block btn-success">CONFIRMAR EMPRÉSTIMO</button>
                </form>
                <div id="msgEmp" style="margin-top:1rem; text-align:center; font-weight:bold; font-size:0.8rem;"></div>
            </div>
        </div>

        <!-- TAB: ACERVO -->
        <div id="tab-registro" class="tab-content">
            <div class="card">
                <div class="form-group">
                    <label>FILTRAR ACERVO</label>
                    <input type="text" id="buscaAdmin" placeholder="BUSCAR LIVRO...">
                </div>
                <div id="admin-cats" class="category-tabs"></div>
            </div>

            <div id="secaoAtrasadosAdmin" class="atrasados-section hidden">
                <h2 style="color:var(--danger); border:none; margin-bottom:0.5rem;">⚠️ ATRASADOS</h2>
                <div id="listaAtrasadosAdmin"></div>
            </div>

            <div id="listaAdmin"></div>
        </div>
    </div>

    <!-- MODAL EDIÇÃO LIVRO -->
    <div id="modalEdit" class="modal hidden">
        <div class="modal-content">
            <h2 style="border:none;">EDITAR LIVRO</h2>
            <form id="formEdit">
                <input type="hidden" id="editId">
                <div class="form-group"><label>ISBN</label><input type="text" id="editIsbn"></div>
                <div class="form-group"><label>ACABAMENTO</label><select id="editAcabamento"><option value=""></option><option value="GRAMPEADO">GRAMPEADO</option><option value="ESPIRAL">ESPIRAL</option><option value="BROCHURA">BROCHURA</option><option value="CAPA DURA">CAPA DURA</option></select></div>
                <div class="form-group"><label>TÍTULO *</label><input type="text" id="editTitulo" required></div>
                <div class="form-group"><label>AUTOR</label><input type="text" id="editAutor"></div>

                <!-- COLABORADORES EDIÇÃO -->
                <div class="form-group full-width" id="editColaboradoresContainer">
                    <div id="editListaColaboradores"></div>
                    <button type="button" onclick="adicionarColaboradorEdit()" class="btn-block btn-outline" style="margin-top:0.5rem; font-size:0.8rem; padding:0.6rem;">+ ADICIONAR COLABORADOR</button>
                </div>

                <div class="form-group"><label>EDITORA</label><input type="text" id="editEditora"></div>
                <div class="form-group">
                    <label class="checkbox-container" id="labelEditPubIndependente" style="margin-top:0.25rem;">
                        <input type="checkbox" id="editPubIndependente" onchange="togglePubIndependente(this, 'editEditora')">
                        PUBLICAÇÃO INDEPENDENTE
                    </label>
                </div>
                <div style="display:grid; grid-template-columns:1fr auto; gap:0.75rem; align-items:end;">
                    <div class="form-group" style="margin-bottom:0;"><label>CATEGORIA *</label><select id="editCategoria" required></select></div>
                    <div class="form-group" style="margin-bottom:0;"><label>PRATELEIRA *</label><input type="text" id="editPrateleira" style="width:56px; text-align:center; text-transform:uppercase;" maxlength="2" pattern="[A-Za-z][0-9]" title="Uma letra seguida de um número (ex: C3)" required></div>
                </div>
                <div class="form-group"><label>QUANTIDADE TOTAL *</label><input type="number" id="editQtd" required></div>
                <div class="form-group"><label>SINOPSE</label><textarea id="editSinopse" rows="3"></textarea></div>
                <!-- CAPA DO LIVRO - EDIÇÃO -->
                <div class="form-group full-width" style="margin-top:0.5rem;">
                    <label>CAPA DO LIVRO</label>
                    <div style="display:flex; gap:1rem; align-items:flex-start; margin-top:0.5rem;">
                        <div class="book-cover-wrap">
                            <img id="editCapaPreview" src="logo.png" alt="Capa" class="cover-placeholder">
                        </div>
                        <div style="display:flex; flex-direction:column; gap:0.5rem; justify-content:center;">
                            <div id="editCapaBtns">
                                <button type="button" class="btn-block btn-outline" style="font-size:0.8rem; padding:0.5rem 0.75rem;"
                                    onclick="document.getElementById('editCapaInput').click()">📷 ESCOLHER IMAGEM</button>
                                <input type="file" id="editCapaInput" accept="image/*" style="display:none;"
                                    onchange="preVisualizarCapa(this,'editCapaPreview','editCapaBtns',true)">
                            </div>
                        </div>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-top:1rem;">
                    <button type="button" onclick="closeModal()" class="btn-block btn-outline">CANCELAR</button>
                    <button type="submit" class="btn-block btn-primary">SALVAR</button>
                </div>
            </form>
        </div>
    </div>

        <!-- TAB: DEVOLUÇÕES -->
        <div id="tab-devolucoes" class="tab-content">
            <div id="listaDevolucoes"></div>
        </div>

    <!-- MODAL RENOVAÇÃO EMPRÉSTIMO -->
    <div id="modalRenovarEmp" class="modal hidden">
        <div class="modal-content">
            <h2 style="border:none;">RENOVAR EMPRÉSTIMO</h2>
            <form id="formRenovarEmp">
                <input type="hidden" id="renovarEmpId">
                <div class="form-group"><label>DIAS ADICIONAIS *</label><input type="number" id="renovarEmpDias" min="1" value="7" required></div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-top:1rem;">
                    <button type="button" onclick="closeModalRenovar()" class="btn-block btn-outline">CANCELAR</button>
                    <button type="submit" class="btn-block btn-success">RENOVAR</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL DUPLICIDADE DE LIVRO -->
    <div id="modalDuplicidade" class="modal hidden">
        <div class="modal-content">
            <h2 style="border:none;">LIVRO JÁ EXISTE</h2>
            <p style="margin-bottom: 1rem; color: var(--text);">Já existe um livro com esse nome cadastrado no sistema.</p>
            <div id="infoDuplicidade" style="background: var(--bg); padding: 1rem; border-radius: 6px; margin-bottom: 1rem; font-size: 0.9rem;">
            </div>
            <p style="margin-bottom: 1rem; color: var(--text);">O que deseja fazer?</p>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                <button type="button" onclick="closeModalDuplicidade()" class="btn-block btn-outline">CANCELAR</button>
                <button type="button" onclick="adicionarQuantidadeExistente()" class="btn-block btn-success">SOMAR QUANTIDADE</button>
            </div>
        </div>
    </div>

    <!-- MODAL EDIÇÃO EMPRÉSTIMO -->
    <div id="modalEditEmp" class="modal hidden">
        <div class="modal-content">
            <h2 style="border:none;">EDITAR EMPRÉSTIMO</h2>
            <form id="formEditEmp">
                <input type="hidden" id="editEmpId">
                <div class="form-group full-width">
                    <label class="checkbox-container" id="labelEditProfessor">
                        <input type="checkbox" id="editEmpEhProfessor" onchange="toggleEditTipoPessoa()">
                        PROFESSOR / FUNCIONÁRIO
                    </label>
                </div>
                <div id="camposEditAluno" style="display:contents;">
                    <div class="form-group"><label>NOME DO ALUNO *</label><input type="text" id="editEmpNome"></div>
                    <div class="form-group"><label>SEXO</label><select id="editEmpSexo"><option value="">SELECIONE</option><option value="M">ALUNO</option><option value="F">ALUNA</option></select></div>
                    <div class="form-group"><label>ANO</label><input type="number" id="editEmpAno"></div>
                    <div class="form-group"><label>TURMA</label><input type="text" id="editEmpTurma"></div>
                </div>
                <div id="camposEditProfessor" style="display:none;">
                    <div class="form-group"><label>NOME DO PROFESSOR/FUNCIONÁRIO *</label><input type="text" id="editEmpNomeProfessor"></div>
                    <div class="form-group">
                        <label>SEXO *</label>
                        <select id="editEmpSexoProfessor">
                            <option value="">SELECIONE</option>
                            <option value="M">FUNCIONÁRIO</option>
                            <option value="F">FUNCIONÁRIA</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="checkbox-container" id="labelEditSemData">
                        <input type="checkbox" id="editEmpSemData" onchange="toggleEditData()">
                        SEM DATA DEFINIDA
                    </label>
                </div>
                <div class="form-group"><label>DIAS DE EMPRÉSTIMO</label><input type="number" id="editEmpDias" min="1" value="7"></div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-top:1rem;">
                    <button type="button" onclick="closeModalEmp()" class="btn-block btn-outline">CANCELAR</button>
                    <button type="submit" class="btn-block btn-primary">SALVAR</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import DB from './database.js';
        window.DB = DB;

        let currentCat = 'TODOS';
        let todosLivros = [];
        let fontSize = parseInt(localStorage.getItem('fontSize')) || 16;

        window.changeFontSize = (delta) => {
            fontSize = Math.min(Math.max(fontSize + delta, 12), 24);
            document.documentElement.style.setProperty('--font-size', fontSize + 'px');
            localStorage.setItem('fontSize', fontSize);
        };

        window.toggleDarkMode = () => {
            const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('darkModeBtn').innerText = theme === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('theme', theme);
        };

        function atualizarNomesEscola() {
            const el = document.getElementById('nomeEscolaAdmin');
            if (el) el.innerHTML = '<span>BIBLIOTECA ESCOLAR DA EMTI</span><span>PROFESSORA MARIA VÂNIA FARIAS LINHARES</span>';
        }

        async function init() {
            await DB.checkAuth();
            
            atualizarNomesEscola();

            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('darkModeBtn').innerText = savedTheme === 'dark' ? '☀️' : '🌙';
            document.documentElement.style.setProperty('--font-size', fontSize + 'px');

            const cats = window.DB.CATEGORIAS;
            const options = '<option value="">SELECIONE</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('categoria').innerHTML = options;
            document.getElementById('editCategoria').innerHTML = options;

            const catTabs = ['TODOS', ...cats].map(c => 
                `<button class="tab-btn ${currentCat === c ? 'active' : ''}" onclick="setCat('${c}')">${c}</button>`
            ).join('');
            document.getElementById('admin-cats').innerHTML = catTabs;

            window.DB.onLivrosChange(() => load());
            window.DB.onEmprestimosChange(() => load());
            setInterval(load, 30000);
            // Mostrar "carregando" apenas no primeiro load
            document.getElementById('listaAdmin').innerHTML = '<p style="text-align:center;padding:2rem;color:var(--text-light);">CARREGANDO...</p>';
            load();

            // Restaurar aba ativa após atualizar a página
            const tabSalva = sessionStorage.getItem('bibvania_tab');
            if (tabSalva && document.getElementById(tabSalva)) {
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tabs-container .tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(tabSalva).classList.add('active');
                const btn = document.querySelector(`.tabs-container .tab-btn[onclick*="${tabSalva}"]`);
                if (btn) btn.classList.add('active');
                if (tabSalva === 'tab-devolucoes') setTimeout(() => window.carregarDevolucoes?.(), 0);
            }
        }

        async function carregarCapasLazy() {
            try {
                const ids = todosLivros.map(l => l.id);
                if (ids.length === 0) return;
                const capas = await window.DB.getCapas(ids);
                todosLivros.forEach(l => { if (capas[l.id]) l.imagem_url = capas[l.id]; });
                Object.entries(capas).forEach(([id, url]) => {
                    document.querySelectorAll(`[data-lightbox-id="${id}"]`).forEach(wrap => {
                        const img = wrap.querySelector('img');
                        if (!img) return;
                        img.src = url;
                        img.style.opacity = '';
                        img.classList.remove('cover-placeholder');
                        wrap.classList.add('has-image', 'capa-carregada');
                    });
                });
            } catch(e) { console.warn('Erro ao carregar capas:', e); }
        }

        window.switchTab = (e, id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.currentTarget.classList.add('active');
            sessionStorage.setItem('bibvania_tab', id);
        };

        window.setCat = (c) => {
            currentCat = c;
            document.querySelectorAll('#admin-cats .tab-btn').forEach(b => b.classList.toggle('active', b.innerText === c));
            renderAcervo();
        };

        // Cache local — evita chamadas desnecessárias ao Supabase na busca/filtro
        let idsAtrasadosCache = [];
        let empsAtivosCache = {}; // livro_id → [empréstimos] — para accordion instantâneo

        // load(): busca livros e empréstimos em paralelo (mais rápido)
        async function load() {
            // Salvar capas já carregadas antes de atualizar a lista
            const capasCache = {};
            todosLivros.forEach(l => { if (l.imagem_url) capasCache[l.id] = l.imagem_url; });

            const [livros, emps] = await Promise.all([
                window.DB.getLivros(),
                window.DB.getEmprestimosAtivos()
            ]);
            todosLivros = [...livros].sort((a, b) => new Date(b.data_cadastro) - new Date(a.data_cadastro));
            idsAtrasadosCache = [...new Set(emps.filter(e => e.atrasado).map(e => e.livro_id))];

            // Restaurar capas do cache — evita piscada ao re-renderizar
            todosLivros.forEach(l => { if (capasCache[l.id]) l.imagem_url = capasCache[l.id]; });

            // Também guardar empréstimos ativos no cache para o accordion usar sem ir ao Supabase
            empsAtivosCache = {};
            emps.forEach(e => {
                if (!empsAtivosCache[e.livro_id]) empsAtivosCache[e.livro_id] = [];
                empsAtivosCache[e.livro_id].push(e);
            });

            renderAcervo();
            carregarCapasLazy();
        }

        // renderAcervo(): filtra e exibe sem ir ao Supabase — instantâneo
        function renderAcervo() {
            const termo = document.getElementById('buscaAdmin').value.toUpperCase();

            let filtrados = todosLivros;
            if (currentCat !== 'TODOS') filtrados = filtrados.filter(l => l.categoria === currentCat);
            if (termo) filtrados = filtrados.filter(l =>
                l.id.toString().includes(termo) ||
                l.titulo.includes(termo) ||
                (l.isbn && l.isbn.toUpperCase().includes(termo)) ||
                (l.autor && l.autor.toUpperCase().includes(termo)) ||
                (l.sinopse && l.sinopse.toUpperCase().includes(termo)) ||
                (l.editora && l.editora.toUpperCase().includes(termo)) ||
                (l.colaboradores && l.colaboradores.some(co => co.nome && co.nome.toUpperCase().includes(termo)))
            );

            const atrasados = filtrados.filter(l => idsAtrasadosCache.includes(l.id));
            const secao = document.getElementById('secaoAtrasadosAdmin');
            if (atrasados.length > 0) {
                secao.classList.remove('hidden');
                document.getElementById('listaAtrasadosAdmin').innerHTML = atrasados.map(l => renderLivro(l, true)).join('');
            } else secao.classList.add('hidden');

            const naoAtrasados = filtrados.filter(l => !idsAtrasadosCache.includes(l.id));
            document.getElementById('listaAdmin').innerHTML =
                naoAtrasados.length ? naoAtrasados.map(l => renderLivro(l, false)).join('') :
                (atrasados.length ? '' : '<p style="text-align:center;padding:2rem;color:var(--text-light);">NENHUM LIVRO ENCONTRADO.</p>');
        }

                            ${temCapa ? '' : '<div class="book-cover-loading">CARREGANDO<br>CAPA</div>'}
                            <img src="${temCapa ? l.imagem_url : ''}" alt="Capa" onerror="this.src='';this.closest('.book-cover-wrap').classList.remove('capa-carregada','has-image');">
                        </div>
                        <div class="book-header-inner">
                            <div class="accordion-indicator" style="position:absolute; top:1rem; right:1rem;">▼</div>
                            <div class="book-title">${isAtr ? '⚠️ ' : ''}ID ${l.id}: ${l.titulo}</div>
                            <div class="book-meta-box">
                                <div class="book-meta-item"><strong>AUTOR:</strong> ${l.autor || 'NÃO INFORMADO'}</div>

                                ${l.editora ? `<div class="book-meta-item"><strong>EDITORA:</strong> ${l.editora}</div>` : (l.pub_independente ? `<div class="book-meta-item"><strong>PUBLICAÇÃO INDEPENDENTE</strong></div>` : '')}
                                <div class="book-meta-item"><strong>ISBN:</strong> ${l.isbn || 'N/A'}</div>
                                ${l.acabamento ? `<div class="book-meta-item"><strong>ACABAMENTO:</strong> ${l.acabamento}</div>` : ''}
                                <div class="book-meta-item"><strong>CATEGORIA:</strong> ${l.categoria}${l.prateleira ? ' | ' + l.prateleira : ''}</div>
                                ${l.sinopse ? `<div class="book-meta-item" style="margin-top:0.5rem; color:var(--text); font-size:0.75rem; background:var(--bg); padding:0.5rem; border-radius:6px;"><strong>SINOPSE:</strong> ${l.sinopse}</div>` : ''}
                            </div>
                            <div class="book-status-row">
                                <div style="display:flex; gap:0.5rem;">
                                    <button class="control-btn" onclick="event.stopPropagation(); openEdit(${l.id})" style="background:var(--primary); width:40px; height:40px; border-radius:8px; font-size:1.2rem;">✏️</button>
                                    <button class="control-btn" onclick="event.stopPropagation(); delLivro(${l.id})" style="background:var(--danger); width:40px; height:40px; border-radius:8px; font-size:1.2rem;">🗑️</button>
                                </div>
                                <span class="badge ${l.quantidade_disponivel > 0 ? 'badge-disponivel' : 'badge-indisponivel'}">
                                    ${l.quantidade_disponivel}/${l.quantidade_total} DISPONÍVEIS
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="book-details" id="${prefix}det-${l.id}" data-id="${l.id}">
                        <div id="${prefix}emps-${l.id}"></div>
                    </div>
                </div>
            `;
        }

        window.toggleAcc = (el, prefix) => {
            const content = el.nextElementSibling;
            const indicator = el.querySelector('.accordion-indicator');
            content.classList.toggle('active');
            el.classList.toggle('active');
            if (indicator) indicator.classList.toggle('active');
            if (content.classList.contains('active')) loadEmps(content.dataset.id, prefix);
        };

        function obterRotuloGenero(sexo, turmaAluno, anoAluno) {
            // Verificar se é funcionário/professor
            if (turmaAluno === 'PROF/FUNC' || turmaAluno === 'PROFESSOR' || turmaAluno === 'FUNCIONARIO') {
                return sexo === 'M' ? 'Funcionário' : 'Funcionária';
            } else {
                const genero = sexo === 'M' ? 'Aluno' : 'Aluna';
                return `${genero}, ${anoAluno}º ano, ${turmaAluno}`;
            }
        }
        
        async function loadEmps(id, prefix) {
            const container = document.getElementById(`${prefix}emps-${id}`);
            // Usa cache carregado pelo load() — resposta instantânea
            const emps = empsAtivosCache[parseInt(id)] || [];
            if (emps.length === 0) { container.innerHTML = '<p style="font-size:0.7rem;">SEM EMPRÉSTIMOS.</p>'; return; }
            container.innerHTML = emps.map(e => {
                const rotulo = obterRotuloGenero(e.sexo, e.turma_aluno, e.ano_aluno);
                return `
                <div class="loan-item" style="background: var(--card); padding: 0.75rem; border-radius: 8px; margin-bottom: 0.5rem; border: 1px solid var(--border);">
                    <div style="font-size:0.75rem;">
                        <strong>${e.nome_aluno}</strong> (${rotulo})<br>
                        DEVOLUÇÃO: ${e.sem_data_definida ? 'SEM DATA' : new Date(e.data_prevista_devolucao).toLocaleDateString('pt-BR')}
                        ${e.atrasado ? '<br><span class="atrasado-label">⚠️ ATRASADO</span>' : ''}
                    </div>
                    <div style="display:flex; flex-wrap:wrap; gap:0.4rem; margin-top:0.5rem;">
                        <button onclick="devolver(${e.id})" class="btn-small btn-success" style="flex:1; min-width:80px;">DEVOLVER</button>
                        <button onclick="openEditEmp(${JSON.stringify(e).replace(/"/g, '&quot;')})" class="btn-small btn-primary" style="flex:1; min-width:80px;">EDITAR</button>
                        <button onclick="openRenovarEmp(${e.id})" class="btn-small" style="background:var(--warning);color:white;flex:1;min-width:80px;">RENOVAR</button>
                        <button onclick="delEmp(${e.id})" class="btn-small btn-danger" style="flex:1; min-width:80px;">EXCLUIR</button>
                    </div>
                </div>
            `;
            }).join('');
        }

                });

                        await window.DB.uploadCapa(livroId, window._editCapaBase64);

                        const capaUrl = window._editCapaBase64;
                        const livroCache = todosLivros.find(l => l.id === livroId);
                        if (livroCache) livroCache.imagem_url = capaUrl;
                        document.querySelectorAll(`[data-lightbox-id="${livroId}"] img`).forEach(img => {
                            img.src = capaUrl;
                            img.classList.remove('cover-placeholder');
                            img.closest('.book-cover-wrap').classList.add('has-image');

                        window._editCapaBase64 = null;
                    } catch(capErr) {
                        console.error('Capa não salva:', capErr);
                        mostrarMsg('msgLivro', '⚠️ DADOS SALVOS, MAS A CAPA NÃO FOI SALVA: ' + (capErr.message || capErr), 'danger');

                    try {
                        const livroId = parseInt(document.getElementById('editId').value);

        window.openEditEmp = (e) => {

        window.openRenovarEmp = async (empId) => {
            document.getElementById('renovarEmpId').value = empId;
            document.getElementById('renovarEmpDias').value = 7;
            document.getElementById('modalRenovarEmp').classList.remove('hidden');
        };
        
        window.closeModalRenovar = () => document.getElementById('modalRenovarEmp').classList.add('hidden');
        
        document.getElementById('formRenovarEmp').addEventListener('submit', async (e) => {
            e.preventDefault();
            const empId = parseInt(document.getElementById('renovarEmpId').value);
            const diasAdicionais = parseInt(document.getElementById('renovarEmpDias').value);
            
            try {
                
                // Buscar o empréstimo atual
                const emprestimos = await window.DB.getEmprestimos();
                const emprestimo = emprestimos.find(e => e.id === empId);
                
                if (!emprestimo) {
                    throw new Error('Empréstimo não encontrado');
                }
                
                
                // Calcular nova data
                let novaData;
                if (emprestimo.sem_data_definida) {
                    novaData = new Date();
                } else {
                    novaData = new Date(emprestimo.data_prevista_devolucao);
                }
                novaData.setDate(novaData.getDate() + diasAdicionais);
                
                
                // Atualizar empréstimo
                await window.DB.atualizarEmprestimo({
                    id: empId,
                    dias_emprestimo: (emprestimo.dias_emprestimo || 0) + diasAdicionais,
                    sem_data_definida: false
                });
                
                closeModalRenovar();
                mostrarMsg('msgEmp', '✓ RENOVADO!', 'success');
                load();
                carregarDevolucoes();

                console.error('Erro ao renovar:', err);
                mostrarMsg('msgEmp', '❌ ERRO AO RENOVAR: ' + (err.message || 'Erro desconhecido'), 'danger');
            }

                const resultado = await window.DB.salvarLivro({
                    isbn: document.getElementById('isbn').value,

                    titulo: document.getElementById('titulo').value,

                });
                // Salvar capa (base64) se houver imagem selecionada
                if (window._capaBase64 && resultado && resultado.data) {
                    try {
                        const capaUrl = window._capaBase64;
                        await window.DB.uploadCapa(resultado.data.id, capaUrl);
                        // Salva no cache para aparecer imediatamente após o load()
                        const novoLivro = todosLivros.find(l => l.id === resultado.data.id);
                        if (novoLivro) novoLivro.imagem_url = capaUrl;
                    } catch(capErr) {
                        console.error('Capa não salva:', capErr);
                        mostrarMsg('msgLivro', '⚠️ LIVRO SALVO, MAS A CAPA NÃO FOI SALVA: ' + (capErr.message || capErr), 'danger');
                    }
                }
                window._capaBase64 = null;
                // Reset preview capa
                const capaImg = document.getElementById('capaPreview');
                capaImg.src = 'logo.png'; capaImg.className = 'cover-placeholder';
                removerCapa('cadastro','capaPreview','capaBtns','capaInput');
                btnLivro.textContent = lblLivro; btnLivro.disabled = false;
                mostrarMsg('msgLivro', '✓ CADASTRADO!', 'success');
                e.target.reset();
                document.getElementById('listaColaboradores').innerHTML = '';
                document.getElementById('acabamento').value = '';
                document.getElementById('prateleira').value = '';
                const piCb = document.getElementById('pubIndependente');
                if (piCb.checked) { piCb.checked = false; piCb.dispatchEvent(new Event('change')); }
                document.getElementById('labelPubIndependente').classList.remove('checked');
                load();
            } catch(err) { btnLivro.textContent = lblLivro; btnLivro.disabled = false; mostrarMsg('msgLivro', '❌ ERRO: ' + (err.message || 'Erro desconhecido ao cadastrar livro'), 'danger'); console.error('Erro ao cadastrar livro:', err); }
        });

        window.toggleTipoPessoa = () => {
            const cb = document.getElementById('ehProfessor');
            const label = document.getElementById('labelProfessor');
            label.classList.toggle('checked', cb.checked);
            const isP = cb.checked;
            document.getElementById('camposAluno').style.display = isP ? 'none' : 'contents';
            document.getElementById('camposProfessor').style.display = isP ? 'block' : 'none';
            // Limpar campos quando alternar
            if (isP) {
                document.getElementById('nomeAluno').value = '';
                document.getElementById('sexo').value = '';
                document.getElementById('ano').value = '';
                document.getElementById('turma').value = '';
            } else {
                document.getElementById('nomeProfessor').value = '';
                document.getElementById('sexoProfessor').value = '';
            }
        };

        window.toggleData = () => {
            const cb = document.getElementById('semData');
            const label = document.getElementById('labelSemData');
            label.classList.toggle('checked', cb.checked);
            document.getElementById('dias').disabled = cb.checked;
        };

        document.getElementById('livroSearch').addEventListener('input', async (e) => {
            const t = e.target.value.toUpperCase();
            const sug = document.getElementById('sugestoes');
            if(!t) { sug.style.display = 'none'; return; }
            const res = todosLivros.filter(l => l.titulo.includes(t) || l.id.toString().includes(t)).slice(0,5);
            sug.innerHTML = res.map(l => `<div onclick="selLivro(${l.id},'${l.titulo}')" style="padding:0.8rem; border-bottom:1px solid var(--border); cursor:pointer;">ID ${l.id}: ${l.titulo}</div>`).join('');
            sug.style.display = 'block';
        });

        window.selLivro = (id, t) => {
            document.getElementById('livroId').value = id;
            document.getElementById('livroSearch').value = t;
            document.getElementById('sugestoes').style.display = 'none';
        };

        document.getElementById('formEmprestimo').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btnEmp = e.target.querySelector('button[type="submit"]');
            const lblEmp = btnEmp.textContent;
            btnEmp.textContent = 'SALVANDO...'; btnEmp.disabled = true;
            try {
                const isP = document.getElementById('ehProfessor').checked;
                const data = {
                    livro_id: parseInt(document.getElementById('livroId').value),
                    sem_data_definida: document.getElementById('semData').checked,
                    dias_emprestimo: document.getElementById('dias').value
                };
                if(isP) { 
                    data.nome_aluno = document.getElementById('nomeProfessor').value; 
                    data.turma_aluno = 'PROF/FUNC'; 
                    data.sexo = document.getElementById('sexoProfessor').value; 
                    data.ano_aluno = 0; 
                }
                else { 
                    data.nome_aluno = document.getElementById('nomeAluno').value; 
                    data.sexo = document.getElementById('sexo').value; 
                    data.ano_aluno = document.getElementById('ano').value; 
                    data.turma_aluno = document.getElementById('turma').value; 
                    
                    // Verificar se o aluno ja tem emprestimo ativo
                    const emprestimosAtivos = await window.DB.getEmprestimosAtivos();
                    const alunoTemEmprestimoAtivo = emprestimosAtivos.some(e => 
                        e.nome_aluno.toUpperCase() === data.nome_aluno.toUpperCase() &&
                        e.ano_aluno == data.ano_aluno &&
                        e.turma_aluno === data.turma_aluno &&
                        e.turma_aluno !== 'PROF/FUNC'
                    );
                    
                    if (alunoTemEmprestimoAtivo) {
                        btnEmp.textContent = lblEmp; btnEmp.disabled = false;
                        mostrarMsg('msgEmp', '❌ EMPRÉSTIMO CANCELADO: ALUNO JÁ TEM UM EMPRÉSTIMO ATIVO!', 'danger');
                        return;
                    }
                }
                
                await window.DB.registrarEmprestimo(data);
                btnEmp.textContent = lblEmp; btnEmp.disabled = false;
                mostrarMsg('msgEmp', '✓ REGISTRADO!', 'success');
                e.target.reset();
                toggleTipoPessoa();
                toggleData();
                load();
            } catch(err) { btnEmp.textContent = lblEmp; btnEmp.disabled = false; mostrarMsg('msgEmp', '❌ ' + err.message, 'danger'); }
        });

        document.getElementById('buscaAdmin').addEventListener('input', renderAcervo);
        init();

        // ── ABA DEVOLUÇÕES ────────────────────────────────────────────────────
        window.carregarDevolucoes = async () => {
            const container = document.getElementById('listaDevolucoes');
            container.innerHTML = '<p style="text-align:center;padding:2rem;color:var(--text-light);">CARREGANDO...</p>';

            const emps = await window.DB.getEmprestimosAtivosComLivro();

            if (!emps.length) {
                container.innerHTML = '<p style="text-align:center;padding:2rem;color:var(--text-light);">NENHUM EMPRÉSTIMO ATIVO.</p>';
                return;
            }

            const hoje = new Date(); hoje.setHours(0,0,0,0);

            // Separar professores/funcionários dos alunos
            const funcGroup  = { label: 'PROFESSORES E FUNCIONÁRIOS', key: 'func', itens: [] };
            const turmaMap   = {}; // "ANO|TURMA" → []

            emps.forEach(e => {
                if (e.turma_aluno === 'PROF/FUNC') {
                    funcGroup.itens.push(e);
                } else {
                    const key = `${e.ano_aluno}|${e.turma_aluno}`;
                    if (!turmaMap[key]) turmaMap[key] = [];
                    turmaMap[key].push(e);
                }
            });

            // Ordenar turmas: primeiro por ano, depois por turma
            const turmaKeys = Object.keys(turmaMap).sort((a, b) => {
                const [anoA, turA] = a.split('|');
                const [anoB, turB] = b.split('|');
                return anoA - anoB || turA.localeCompare(turB);
            });

            let html = '';

            // Renderizar grupos de turma
            turmaKeys.forEach(key => {
                const [ano, turma] = key.split('|');
                const itens = turmaMap[key];
                html += renderGrupoDevolucao(`${ano}º ANO — TURMA ${turma}`, key, itens, hoje);
            });

            // Renderizar professores/funcionários
            if (funcGroup.itens.length) {
                html += renderGrupoDevolucao(funcGroup.label, funcGroup.key, funcGroup.itens, hoje);
            }

            container.innerHTML = html;
        };

        function renderGrupoDevolucao(titulo, key, itens, hoje) {
            // Agrupar empréstimos pelo nome da pessoa — uma linha por pessoa, vários livros dentro
            const pessoaMap = {};
            itens.forEach(e => {
                const nome = e.nome_aluno;
                if (!pessoaMap[nome]) pessoaMap[nome] = [];
                pessoaMap[nome].push(e);
            });

            const pessoasOrdenadas = Object.keys(pessoaMap).sort();
            let totalPessoas = pessoasOrdenadas.length;

            const alunosHtml = pessoasOrdenadas.map(nome => {
                const emprestimos = pessoaMap[nome];
                const pessoaId = `dev-${key}-${nome.replace(/\s+/g, '_')}`;

                // Badges: mostrar se qualquer empréstimo tiver aviso
                const temHoje    = emprestimos.some(e => {
                    if (!e.data_prevista_devolucao) return false;
                    const d = new Date(e.data_prevista_devolucao); d.setHours(0,0,0,0);
                    return d.getTime() === hoje.getTime();
                });
                const temAtrasado = emprestimos.some(e => {
                    if (!e.data_prevista_devolucao) return false;
                    const d = new Date(e.data_prevista_devolucao); d.setHours(0,0,0,0);
                    return d < hoje;
                });

                const badgeHoje   = temHoje    ? '<span style="background:#f59e0b;color:#fff;font-size:0.65rem;font-weight:800;padding:0.2rem 0.5rem;border-radius:6px;margin-left:0.4rem;">DEVOLVER HOJE!</span>' : '';
                const badgeAtraso = temAtrasado ? '<span class="atrasado-label" style="margin-left:0.4rem;">⚠️ ATRASADO</span>' : '';
                const contLivros  = emprestimos.length > 1 ? `<span style="font-size:0.7rem;font-weight:400;color:var(--text-light);margin-left:0.4rem;">(${emprestimos.length} livros)</span>` : '';

                // Renderizar cada livro dentro do acordeão
                const livrosHtml = emprestimos.map((e, idx) => {
                    const dataPrev = e.data_prevista_devolucao ? new Date(e.data_prevista_devolucao) : null;
                    if (dataPrev) dataPrev.setHours(0,0,0,0);
                    const livro = e.livros || {};
                    const separador = idx > 0 ? 'border-top:1px solid var(--border);margin-top:0.75rem;padding-top:0.75rem;' : '';
                    return `
                        <div style="${separador}">
                            <div style="margin-bottom:0.3rem;"><strong>LIVRO ${emprestimos.length > 1 ? idx+1 + ':' : ':'}</strong> ${livro.titulo || '—'}</div>
                            <div style="margin-bottom:0.3rem;"><strong>AUTOR:</strong> ${livro.autor || 'NÃO INFORMADO'}</div>
                            <div style="margin-bottom:0.3rem;"><strong>CATEGORIA:</strong> ${livro.categoria || '—'}${livro.prateleira ? ' | ' + livro.prateleira : ''}</div>
                            <div style="margin-bottom:0.3rem;"><strong>EMPRÉSTIMO:</strong> ${new Date(e.data_emprestimo).toLocaleDateString('pt-BR')}</div>
                            <div style="margin-bottom:0.75rem;"><strong>DEVOLUÇÃO:</strong> ${e.sem_data_definida ? 'SEM DATA' : (dataPrev ? dataPrev.toLocaleDateString('pt-BR') : '—')}</div>
                            <div style="display:flex;gap:0.4rem;flex-wrap:wrap;">
                                <button onclick="devolverEAtualizar(${e.id})" class="btn-small btn-success" style="flex:1;min-width:80px;">DEVOLVER</button>
                                <button onclick="openEditEmp(${JSON.stringify(e).replace(/"/g, '&quot;')})" class="btn-small btn-primary" style="flex:1;min-width:80px;">EDITAR</button>
                                <button onclick="openRenovarEmp(${e.id})" class="btn-small" style="background:var(--warning);color:white;flex:1;min-width:80px;">RENOVAR</button>
                                <button onclick="delEmpEAtualizar(${e.id})" class="btn-small btn-danger" style="flex:1;min-width:80px;">EXCLUIR</button>
                            </div>
                        </div>`;
                }).join('');

                return `
                <div style="border:1px solid var(--border);border-radius:8px;margin-bottom:0.5rem;overflow:hidden;">
                    <div onclick="toggleDevAcc('${pessoaId}')" style="display:flex;align-items:center;justify-content:space-between;padding:0.75rem 1rem;cursor:pointer;background:var(--card);">
                        <div style="font-size:0.82rem;font-weight:700;flex:1;">
                            ${nome}${contLivros}${badgeHoje}${badgeAtraso}
                        </div>
                        <span id="${pessoaId}-ind" style="font-size:0.75rem;color:var(--text-light);transition:transform 0.2s;">▼</span>
                    </div>
                    <div id="${pessoaId}" class="book-details" style="font-size:0.78rem;">
                        ${livrosHtml}
                    </div>
                </div>`;
            }).join('');

            return `
            <div class="card" style="margin-bottom:1rem;">
                <h3 style="font-size:0.85rem;font-weight:800;color:var(--primary);border:none;margin-bottom:0.75rem;letter-spacing:0.05em;">
                    ${titulo} <span style="font-weight:400;color:var(--text-light);">(${totalPessoas})</span>
                </h3>
                ${alunosHtml}
            </div>`;
        }

        window.toggleDevAcc = (id) => {
            const el  = document.getElementById(id);
            const ind = document.getElementById(id + '-ind');
            el.classList.toggle('active');
            if (ind) ind.style.transform = el.classList.contains('active') ? 'rotate(180deg)' : '';
        };

        // Devolver e recarregar a aba de devoluções
        window.devolverEAtualizar = async (id) => {
            if (!confirm('CONFIRMAR DEVOLUÇÃO?')) return;
            try {
                await window.DB.registrarDevolucao(id, new Date().toISOString());
                load();
                carregarDevolucoes();
            } catch(err) { mostrarMsg('msgEmp', '❌ ERRO: ' + err.message, 'danger'); }
        };

        window.delEmpEAtualizar = async (id) => {
            if (!confirm('EXCLUIR REGISTRO DE EMPRÉSTIMO?')) return;
            try {
                await window.DB.excluirEmprestimo(id);
                load();
                carregarDevolucoes();
            } catch(err) { mostrarMsg('msgEmp', '❌ ERRO: ' + err.message, 'danger'); }
        };
        // ── FIM ABA DEVOLUÇÕES ────────────────────────────────────────────────
    </script>
    <div vw class="enabled"><div vw-access-button class="active"></div><div vw-plugin-wrapper><div class="vw-plugin-top-wrapper"></div></div></div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>new window.VLibras.Widget('https://vlibras.gov.br/app');</script>

    <script>
    // =====================================================================
    // COLABORADORES
    // =====================================================================
    function criarCampoColaborador(funcao = '', nome = '', prefixId = 'col', lista = 'listaColaboradores') {
        const id = Date.now() + Math.random().toString(36).slice(2);
        const div = document.createElement('div');
        div.className = 'colaborador-item';
        div.id = `${prefixId}-${id}`;
        div.style.cssText = 'background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:0.75rem; margin-bottom:0.5rem;';
        div.innerHTML = `
            <div style="display:grid; grid-template-columns:1fr 1fr auto; gap:0.5rem; align-items:center;">
                <input class="col-funcao" type="text" placeholder="FUNÇÃO"
                    style="padding:0.5rem; font-size:0.8rem; border:1px solid var(--border); border-radius:6px; background:var(--card); color:var(--text); width:100%;"
                    value="${funcao}">
                <input class="col-nome" type="text" placeholder="NOME"
                    style="padding:0.5rem; font-size:0.8rem; border:1px solid var(--border); border-radius:6px; background:var(--card); color:var(--text); width:100%;"
                    value="${nome}">
                <button type="button" onclick="document.getElementById('${prefixId}-${id}').remove()"
                    style="background:var(--danger); border:none; color:white; border-radius:6px; width:30px; height:30px; cursor:pointer; font-size:1.1rem; flex-shrink:0; display:flex; align-items:center; justify-content:center;">×</button>
            </div>
        `;
        document.getElementById(lista).appendChild(div);
    }

    window.adicionarColaborador = () => criarCampoColaborador('', '', 'col', 'listaColaboradores');
    window.adicionarColaboradorEdit = (funcao = '', nome = '') => criarCampoColaborador(funcao, nome, 'edit-col', 'editListaColaboradores');

    function coletarDeLista(listaId) {
        const items = document.getElementById(listaId).querySelectorAll('.colaborador-item');
        const result = [];
        items.forEach(item => {
            const funcao = item.querySelector('.col-funcao').value.trim();
            const nome = item.querySelector('.col-nome').value.trim();
            if (!nome) return;
            result.push({ funcao: funcao || 'COLABORADOR', nome });
        });
        return result;
    }

    window.coletarColaboradores = () => coletarDeLista('listaColaboradores');
    window.coletarColaboradoresEdit = () => coletarDeLista('editListaColaboradores');

    // =====================================================================
    // PUBLICAÇÃO INDEPENDENTE
    // =====================================================================
    window.togglePubIndependente = (cb, editoraId) => {
        const label = cb.closest('.checkbox-container');
        label.classList.toggle('checked', cb.checked);
        const input = document.getElementById(editoraId);
        input.disabled = cb.checked;
        input.style.opacity = cb.checked ? '0.4' : '1';
        if (cb.checked) input.value = '';
    };

    // =====================================================================
    // MENSAGENS TEMPORÁRIAS
    // =====================================================================
    const _msgTimers = {};
    window.mostrarMsg = (id, texto, tipo) => {
        const el = document.getElementById(id);
        if (!el) return;
        const cor = tipo === 'success' ? 'var(--success)' : 'var(--danger)';
        const icone = tipo === 'success' ? '✓' : '❌';
        el.innerHTML = `<span style="color:${cor}">${texto}</span>`;
        clearTimeout(_msgTimers[id]);
        // Erros ficam 4s, sucessos 1.5s
        _msgTimers[id] = setTimeout(() => { el.innerHTML = ''; }, tipo === 'success' ? 1500 : 4000);
    };

    // =====================================================================
    // CAPA DO LIVRO — PRÉ-VISUALIZAÇÃO E UPLOAD
    // =====================================================================

    // Base64 da capa selecionada no cadastro
    window._capaBase64 = null;
    // Base64 e flags para edição
    window._editCapaBase64 = null;
    window._editCapaExcluir = false;

    // Comprime imagem para capa de livro com boa qualidade ampliada
    // 1200px / JPEG 88% — nítido na lista e no lightbox ampliado
    // Reduz progressivamente só se necessário para caber no Supabase (~700KB base64)
    function comprimirImagem(imageSrc) {
        return new Promise((resolve) => {
            const original = new Image();
            original.onload = () => {
                const LIMITE = 700000;
                let maxPx = 1440;
                let qualidade = 0.88;
                let base64;

                do {
                    const scale = Math.min(1, maxPx / Math.max(original.width, original.height));
                    const canvas = document.createElement('canvas');
                    canvas.width  = Math.round(original.width  * scale);
                    canvas.height = Math.round(original.height * scale);
                    canvas.getContext('2d').drawImage(original, 0, 0, canvas.width, canvas.height);
                    base64 = canvas.toDataURL('image/jpeg', qualidade);

                    // Reduz qualidade primeiro (preserva tamanho), depois reduz dimensão
                    if (base64.length > LIMITE) {
                        if (qualidade > 0.55) {
                            qualidade = Math.max(0.55, qualidade - 0.08);
                        } else {
                            maxPx = Math.round(maxPx * 0.82);
                            qualidade = 0.80;
                        }
                    }
                } while (base64.length > LIMITE && maxPx > 300);

                resolve(base64);
            };
            original.src = imageSrc;
        });
    }

    // Pré-visualiza a imagem escolhida e mostra botões Trocar/Excluir
    window.preVisualizarCapa = (input, imgId, btnsId, isEdit) => {
        const file = input.files[0];
        if (!file) return;

        const submitBtn = document.querySelector('#formLivro button[type="submit"]');
        if (!isEdit && submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'PROCESSANDO IMAGEM...'; }

        const reader = new FileReader();
        reader.onload = async (e) => {
            const base64 = await comprimirImagem(e.target.result);

            const img = document.getElementById(imgId);
            img.src = base64;
            img.className = '';

            if (isEdit) {
                window._editCapaBase64 = base64;
                window._editCapaExcluir = false;
                renderBotoesCapa('edit');
            } else {
                window._capaBase64 = base64;
                renderBotoesCapa('cadastro');
                if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'CADASTRAR LIVRO'; }
            }
        };
        reader.readAsDataURL(file);
    };

    // Renderiza botões Trocar/Excluir após imagem carregada
    window.renderBotoesCapa = (modo) => {
        const btnsId = modo === 'edit' ? 'editCapaBtns' : 'capaBtns';
        const inputId = modo === 'edit' ? 'editCapaInput' : 'capaInput';
        const imgId   = modo === 'edit' ? 'editCapaPreview' : 'capaPreview';
        document.getElementById(btnsId).innerHTML = `
            <button type="button" class="btn-block btn-outline" style="font-size:0.8rem;padding:0.5rem 0.75rem;margin-bottom:0.4rem;"
                onclick="document.getElementById('${inputId}').click()">🔄 TROCAR</button>
            <button type="button" class="btn-block btn-danger" style="font-size:0.8rem;padding:0.5rem 0.75rem;"
                onclick="removerCapa('${modo}','${imgId}','${btnsId}','${inputId}')">🗑️ EXCLUIR</button>
            <input type="file" id="${inputId}" accept="image/*" style="display:none;"
                onchange="preVisualizarCapa(this,'${imgId}','${btnsId}',${modo === 'edit'})">
        `;
    };

    // Remove a capa selecionada (volta à logo)
    window.removerCapa = (modo, imgId, btnsId, inputId) => {
        const img = document.getElementById(imgId);
        img.src = 'logo.png';
        img.className = 'cover-placeholder';
        if (modo === 'edit') {
            window._editCapaBase64 = null;
            window._editCapaExcluir = true;
        } else {
            window._capaBase64 = null;
            // Garantir que o submit esteja habilitado (sem imagem = pode cadastrar)
            const submitBtn = document.querySelector('#formLivro button[type="submit"]');
            if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'CADASTRAR LIVRO'; }
        }
        document.getElementById(btnsId).innerHTML = `
            <button type="button" class="btn-block btn-outline" style="font-size:0.8rem;padding:0.5rem 0.75rem;"
                onclick="document.getElementById('${inputId}').click()">📷 ESCOLHER IMAGEM</button>
            <input type="file" id="${inputId}" accept="image/*" style="display:none;"
                onchange="preVisualizarCapa(this,'${imgId}','${btnsId}',${modo === 'edit'})">
        `;
    };

    </script>

    <!-- Lightbox de capa -->
    <div class="lightbox-overlay" id="capLightbox">
        <div class="lightbox-bg" onclick="fecharLightbox()"></div>
        <div class="lightbox-img-wrap">
            <img id="capLightboxImg" src="" alt="Capa ampliada">
            <div class="lightbox-img-title" id="capLightboxTitle"></div>
        </div>
        <button class="lightbox-back" onclick="fecharLightbox()">← VOLTAR</button>
    </div>
    <script>
        function fecharLightbox() {
            document.getElementById('capLightbox').classList.remove('open');
        }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') fecharLightbox(); });

        // Delegação de evento — evita conflito com toggleAccordion
        document.addEventListener('click', e => {
            const wrap = e.target.closest('.book-cover-wrap.has-image');
            if (!wrap) return;
            e.stopPropagation();
            const src = wrap.querySelector('img') ? wrap.querySelector('img').src : null;
            const titulo = wrap.dataset.lightboxTitulo || '';
            if (!src) return;
            const img = document.getElementById('capLightboxImg');
            img.src = src;
            document.getElementById('capLightboxTitle').textContent = titulo;
            document.getElementById('capLightbox').classList.add('open');
        }, true); // true = captura, antes do toggleAccordion
    </script>
