    <script type="module">
        import DB from './database.js';
        import { iniciarBuscaVoz, criarDropdownCategoria } from './bibvania-utils.js';
        window.DB = DB;

        let currentCategory = 'TODOS';
        let fontSize = parseInt(localStorage.getItem('fontSize')) || 16;
        let todosLivros = [];
        let idsAtrasadosCache = [];
        let empsAtivosCache = {};
        // Collator instanciado uma vez — localeCompare inline é ~10x mais lento
        const _collator = new Intl.Collator('pt-BR', { sensitivity: 'base' });
        // Cache da lista ordenada — só recalcula quando todosLivros muda
        let _livrosOrdenados = [];
        let _idsComCapaCache = null;
        let _jaCarregouUmaVez = false;

        // ── Preferências ───────────────────────────────────────────
        window.changeFontSize = (delta) => {
            fontSize = Math.min(Math.max(fontSize + delta, 12), 24);
            document.documentElement.style.setProperty('--font-size', fontSize + 'px');
            localStorage.setItem('fontSize', fontSize);
        };
        window.toggleDarkMode = () => {
            const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            // Suprimir transition durante troca de tema — evita repaint lento de toda a página
            document.documentElement.classList.add('no-theme-transition');
            document.documentElement.setAttribute('data-theme', theme);
            requestAnimationFrame(() => {
                requestAnimationFrame(() => document.documentElement.classList.remove('no-theme-transition'));
            });
            const btn = document.getElementById('darkModeBtn');
            btn.innerText = theme === 'dark' ? '☀️' : '🌙';
            btn.setAttribute('aria-pressed', theme === 'dark' ? 'true' : 'false');
            localStorage.setItem('theme', theme);
        };
        function aplicarPreferencias() {
            const t = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', t);
            const btn = document.getElementById('darkModeBtn');
            if (btn) { btn.innerText = t === 'dark' ? '☀️' : '🌙'; btn.setAttribute('aria-pressed', t === 'dark' ? 'true' : 'false'); }
            document.documentElement.style.setProperty('--font-size', fontSize + 'px');
        }

        // ── Utilitários ────────────────────────────────────────────
        function normalizar(str) {
            return (str || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toUpperCase();
        }
        function obterRotuloGenero(sexo, turma, ano) {
            if (['PROF/FUNC','PROFESSOR','FUNCIONARIO'].includes(turma)) return sexo === 'M' ? 'Funcionário' : 'Funcionária';
            return `${sexo === 'M' ? 'Aluno' : 'Aluna'}, ${ano}º ano, ${turma}`;
        }
        window.obterRotuloGenero = obterRotuloGenero;

        // ── Accordion ──────────────────────────────────────────────
        window.toggleAccordion = (el, prefix) => {
            const content = el.nextElementSibling;
            const indicator = el.querySelector('.accordion-indicator');
            const expanded = content.classList.toggle('active');
            el.classList.toggle('active');
            el.setAttribute('aria-expanded', expanded ? 'true' : 'false');
            if (indicator) indicator.classList.toggle('active');
        };

        // ── Categorias ─────────────────────────────────────────────
        let _renderTimer = null;
        window.setCategory = (cat) => {
            currentCategory = cat;
            const w = document.getElementById('catDropIndex');
            if (w && w._setValor) w._setValor(cat);
            _renderToken++;
            clearTimeout(_renderTimer);
            renderAcervo();
        };

        // ── Render ─────────────────────────────────────────────────
        function renderizarEmprestimos(livroId) {
            const emps = empsAtivosCache[livroId] || [];
            if (!emps.length) return '<p style="font-size:0.7rem;color:var(--text-light);">SEM EMPRÉSTIMOS ATIVOS.</p>';
            return emps.map(e => {
                const rotulo = obterRotuloGenero(e.sexo, e.turma_aluno, e.ano_aluno);
                return `<div class="loan-item" style="background:var(--card);padding:0.75rem;border-radius:8px;margin-bottom:0.5rem;font-size:0.75rem;border:1px solid var(--border);">
                    <strong>${e.nome_aluno}</strong> (${rotulo})<br>
                    DEVOLUÇÃO: ${e.sem_data_definida ? 'SEM DATA' : new Date(e.data_prevista_devolucao).toLocaleDateString('pt-BR')}
                    ${e.atrasado ? '<span class="atrasado-label" style="display:inline;margin-left:5px;">⚠️ ATRASADO</span>' : ''}
                </div>`;
            }).join('');
        }

        function renderizarLivro(l, isAtrasado) {
            const prefix = isAtrasado ? 'atr-' : 'list-';
            const borderStyle = isAtrasado ? 'style="border-color:var(--danger);border-width:2px;"' : '';

            let wrapClasses, labelHtml, temCapa;
            if (!l._capaResolvida) {
                wrapClasses = 'book-cover-wrap';
                labelHtml = '<span class="book-cover-label" aria-hidden="true">CARREGANDO<br>CAPA</span>';
                temCapa = false;
            } else if (l._capaResolvida === 'tem') {
                wrapClasses = 'book-cover-wrap has-image capa-carregada';
                labelHtml = '';
                temCapa = true;
            } else {
                wrapClasses = 'book-cover-wrap sem-capa capa-carregada';
                labelHtml = '<span class="book-cover-label" aria-hidden="true">SEM<br>CAPA</span>';
                temCapa = false;
            }

            return `
            <article class="book-item" ${borderStyle}>
                <div class="book-header"
                    onclick="toggleAccordion(this,'${prefix}')"
                    role="button" tabindex="0"
                    aria-expanded="false"
                    aria-controls="${prefix}details-${l.id}"
                    onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleAccordion(this,'${prefix}');}">
                    <div class="${wrapClasses}"
                        data-lightbox-id="${l.id}"
                        data-lightbox-titulo="${l.titulo.replace(/"/g,'&quot;')}"
                        data-livro-id="${l.id}"
                        role="img" aria-label="Capa: ${l.titulo.replace(/"/g,'&quot;')}">
                        ${labelHtml}
                        <img class="cover-img" src="${temCapa ? l.imagem_url || '' : ''}" alt="Capa: ${l.titulo.replace(/"/g,'&quot;')}">
                    </div>
                    <div class="book-header-inner">
                        <div class="accordion-indicator" style="position:absolute;top:1rem;right:1rem;" aria-hidden="true">▼</div>
                        <div class="book-title">${isAtrasado?'<span aria-hidden="true">⚠️ </span>':''}${l.titulo}</div>
                        <div class="book-meta-box">
                            <div class="book-meta-item"><strong>AUTOR:</strong> ${l.autor||'NÃO INFORMADO'}</div>
                            ${(l.colaboradores||[]).map(co=>`<div class="book-meta-item"><strong>${co.funcao||'COLABORADOR'}:</strong> ${co.nome}</div>`).join('')}
                            ${l.editora?`<div class="book-meta-item"><strong>EDITORA:</strong> ${l.editora}</div>`:l.pub_independente?`<div class="book-meta-item"><strong>PUBLICAÇÃO INDEPENDENTE</strong></div>`:''}
                            <div class="book-meta-item"><strong>ISBN:</strong> ${l.isbn||'N/A'}</div>
                            ${l.acabamento?`<div class="book-meta-item"><strong>ACABAMENTO:</strong> ${l.acabamento}</div>`:''}
                            <div class="book-meta-item"><strong>CATEGORIA:</strong> ${l.categoria}${l.prateleira?' | '+l.prateleira:''}</div>
                            ${l.sinopse?`<div class="book-meta-item" style="margin-top:0.5rem;font-size:0.75rem;background:var(--bg);padding:0.5rem;border-radius:6px;"><strong>SINOPSE:</strong> ${l.sinopse}</div>`:''}
                        </div>
                        <div class="book-status-row">
                            ${isAtrasado?'<span class="atrasado-label" role="alert">⚠️ ATRASO</span>':'<span></span>'}
                            <span class="badge ${l.quantidade_disponivel>0?'badge-disponivel':'badge-indisponivel'}">
                                ${l.quantidade_disponivel}/${l.quantidade_total} DISPONÍVEIS
                            </span>
                        </div>
                    </div>
                </div>
                <div class="book-details" id="${prefix}details-${l.id}" role="region">
                    <div id="${prefix}loans-${l.id}">${renderizarEmprestimos(l.id)}</div>
                </div>
            </article>`;
        }

        // Após renderizar, setar src das imagens via JS (evita base64 quebrar o HTML)
        function aplicarCapasNoDOM(livros) {
            // Monta mapa id→wrap UMA vez para evitar N querySelectorAll no DOM
            const alvo = livros || todosLivros;
            const ids = new Set(alvo.filter(l => l._capaResolvida).map(l => l.id));
            if (!ids.size) return;
            const mapa = {};
            document.querySelectorAll('[data-livro-id]').forEach(wrap => {
                const id = parseInt(wrap.dataset.livroId);
                if (ids.has(id)) (mapa[id] = mapa[id] || []).push(wrap);
            });
            alvo.forEach(l => {
                if (!l._capaResolvida) return;
                (mapa[l.id] || []).forEach(wrap => {
                    if (l._capaResolvida === 'tem' && l.imagem_url) {
                        const img = wrap.querySelector('img.cover-img');
                        if (img && img.src !== l.imagem_url) img.src = l.imagem_url;
                        wrap.className = 'book-cover-wrap has-image capa-carregada';
                        const lbl = wrap.querySelector('.book-cover-label');
                        if (lbl) lbl.style.display = 'none';
                    } else if (l._capaResolvida === 'sem') {
                        if (!wrap.classList.contains('sem-capa')) {
                            wrap.classList.add('sem-capa', 'capa-carregada');
                        }
                        const lbl = wrap.querySelector('.book-cover-label');
                        if (lbl && lbl.textContent.includes('CARREGANDO')) lbl.innerHTML = 'SEM<br>CAPA';
                    }
                });
            });
        }

        // Token de renderização — cancela renders anteriores ao mudar de categoria
        let _renderToken = 0;

        async function renderAcervo() {
            const termo = normalizar(document.getElementById('buscaLivros').value);
            let filtrados = todosLivros;
            if (currentCategory !== 'TODOS') filtrados = filtrados.filter(l => l.categoria === currentCategory);
            if (termo) filtrados = filtrados.filter(l =>
                normalizar(l.titulo).includes(termo) ||
                (l.isbn && normalizar(l.isbn).includes(termo)) ||
                (l.autor && normalizar(l.autor).includes(termo)) ||
                (l.sinopse && normalizar(l.sinopse).includes(termo)) ||
                (l.editora && normalizar(l.editora).includes(termo)) ||
                (l.colaboradores||[]).some(co => normalizar(co.nome).includes(termo))
            );
            if (_livrosOrdenados.length === filtrados.length && currentCategory === 'TODOS' && !termo) {
                filtrados = _livrosOrdenados;
            } else {
                filtrados.sort((a, b) => _collator.compare(a.titulo, b.titulo));
            }

            // Atrasados (geralmente poucos — renderiza de uma vez)
            const atrasados = filtrados.filter(l => idsAtrasadosCache.includes(l.id));
            const secao = document.getElementById('secaoAtrasados');
            if (atrasados.length) {
                secao.classList.remove('hidden');
                document.getElementById('listaAtrasados').innerHTML = atrasados.map(l=>renderizarLivro(l,true)).join('');
            } else secao.classList.add('hidden');

            const normais = filtrados.filter(l => !idsAtrasadosCache.includes(l.id));
            const lista = document.getElementById('listaLivros');

            if (!normais.length) {
                lista.innerHTML = atrasados.length ? '' : '<p style="text-align:center;padding:2rem;">NENHUM LIVRO ENCONTRADO.</p>';
                aplicarCapasNoDOM();
                return;
            }

            const token = ++_renderToken;

            // ── Caminho rápido: todos já resolvidos → renderiza sem flash ──
            const todoResolvido = normais.every(l => l._capaResolvida);
            if (todoResolvido) {
                lista.innerHTML = normais.map(l => renderizarLivro(l, false)).join('');
                _jaCarregouUmaVez = true;
                return;
            }

            // ── Caminho incremental: há capas pendentes ──
            const elLoading = document.createElement('p');
            elLoading.setAttribute('role', 'status');
            elLoading.style.cssText = 'text-align:center;padding:1rem;color:var(--text-light);font-size:0.85rem;';
            elLoading.textContent = 'CARREGANDO...';
            if (_jaCarregouUmaVez) { lista.innerHTML = ''; lista.appendChild(elLoading); }

            (async () => {
                const cancelar = () => {
                    if (elLoading.parentNode) elLoading.parentNode.removeChild(elLoading);
                };

                // Buscar cache de IDs com capa UMA vez antes do loop — marca todos sem-capa instantaneamente
                if (!_idsComCapaCache) {
                    try { _idsComCapaCache = await window.DB.getIdsComCapa(); } catch(e) { _idsComCapaCache = new Set(); }
                    if (token !== _renderToken) { cancelar(); return; }
                }
                // Marcar todos os livros sem capa de uma vez (sem request individual)
                normais.forEach(l => {
                    if (!l._capaResolvida && !_idsComCapaCache.has(l.id)) {
                        l.imagem_url = null; l._capaResolvida = 'sem';
                    }
                });

                // Re-verificar caminho rápido após marcação em lote
                if (normais.every(l => l._capaResolvida)) {
                    cancelar();
                    lista.innerHTML = normais.map(l => renderizarLivro(l, false)).join('');
                    _jaCarregouUmaVez = true;
                    return;
                }

                for (let i = 0; i < normais.length; i++) {
                    if (token !== _renderToken) { cancelar(); return; }
                    const l = normais[i];

                    if (!l._capaResolvida) {
                        // Só chega aqui se tem capa no Supabase
                        try {
                            const url = await window.DB.getCapaUnica(l.id);
                            l.imagem_url = url || null;
                            l._capaResolvida = url ? 'tem' : 'sem';
                        } catch(e) { l._capaResolvida = 'sem'; }
                    }

                    if (token !== _renderToken) { cancelar(); return; }

                    // Remover loading ou texto estático antes do primeiro card
                    if (elLoading.parentNode) elLoading.parentNode.removeChild(elLoading);
                    else if (!_jaCarregouUmaVez) lista.innerHTML = '';

                    const div = document.createElement('div');
                    div.innerHTML = renderizarLivro(l, false);
                    lista.appendChild(div.firstElementChild);
                    _jaCarregouUmaVez = true;

                    if (i < normais.length - 1) {
                        lista.appendChild(elLoading);
                        await new Promise(r => setTimeout(r, 0));
                    }
                }
            })();
        }


        // carregarSemCapas: chamado pelo Realtime/interval — preserva capas já resolvidas
        async function carregarSemCapas() {
            try {
                const capaCache = {};
                todosLivros.forEach(l => { if (l._capaResolvida) capaCache[l.id] = { url: l.imagem_url, res: l._capaResolvida }; });

                const [livros, emps, idsCapas] = await Promise.all([
                    window.DB.getLivros(),
                    window.DB.getEmprestimosAtivos(),
                    window.DB.getIdsComCapa()
                ]);
                todosLivros = livros;
                _livrosOrdenados = [...todosLivros].sort((a, b) => _collator.compare(a.titulo, b.titulo));
                _idsComCapaCache = idsCapas;
                // Restaurar capas já resolvidas
                todosLivros.forEach(l => {
                    if (capaCache[l.id]) { l.imagem_url = capaCache[l.id].url; l._capaResolvida = capaCache[l.id].res; }
                });

                idsAtrasadosCache = [...new Set(emps.filter(e=>e.atrasado).map(e=>e.livro_id))];
                empsAtivosCache = {};
                emps.forEach(e => { (empsAtivosCache[e.livro_id]||(empsAtivosCache[e.livro_id]=[])).push(e); });
                renderAcervo();
                aplicarCapasNoDOM();
            } catch(e) { console.warn('Erro ao atualizar acervo:', e); }
        }

        window.carregarLivros = async function carregarLivros() {
            try {
                const [livros, emps, idsCapas] = await Promise.all([
                    window.DB.getLivros(),
                    window.DB.getEmprestimosAtivos(),
                    window.DB.getIdsComCapa()
                ]);
                todosLivros = livros;
                _livrosOrdenados = [...todosLivros].sort((a, b) => _collator.compare(a.titulo, b.titulo));
                _idsComCapaCache = idsCapas;
                idsAtrasadosCache = [...new Set(emps.filter(e=>e.atrasado).map(e=>e.livro_id))];
                empsAtivosCache = {};
                emps.forEach(e => { (empsAtivosCache[e.livro_id]||(empsAtivosCache[e.livro_id]=[])).push(e); });
                renderAcervo();
            } catch(err) {
                console.error('Erro ao carregar acervo:', err);
                document.getElementById('listaLivros').innerHTML =
                    '<div style="text-align:center;padding:2rem;">' +
                    '<p style="color:var(--danger);font-weight:bold;margin-bottom:1rem;">⚠️ ERRO AO CARREGAR ACERVO</p>' +
                    '<p style="color:var(--text-light);font-size:0.85rem;margin-bottom:1rem;">Verifique sua conexão com a internet e tente novamente.</p>' +
                    '<p style="font-size:0.8rem;color:var(--text-light);margin-top:0.5rem;">📶 Internet instável? Recarregue a página.</p>' +
                    '<button onclick="carregarLivros()" class="btn-block btn-primary" style="max-width:200px;margin:0 auto;">🔄 TENTAR NOVAMENTE</button>' +
                    '</div>';
            }
        }

        // ── Inicialização ──────────────────────────────────────────
        async function inicializar() {
            aplicarPreferencias();

            // Busca por voz
            iniciarBuscaVoz(document.getElementById('buscaLivros'), () => renderAcervo());

            // Botão X de limpar — aparece à esquerda do botão de voz
            _iniciarBotaoLimpar(document.getElementById('buscaLivros'), renderAcervo);

            // Listener de busca por texto
            document.getElementById('buscaLivros').addEventListener('input', renderAcervo);

            // Realtime + interval (preservam capas já resolvidas)
            let _rt = null;
            const debounce = () => { clearTimeout(_rt); _rt = setTimeout(carregarSemCapas, 300); };
            window.DB.onLivrosChange(payload => {
                const cols = payload?.new && payload?.old ? Object.keys(payload.new).filter(k=>payload.new[k]!==payload.old[k]) : null;
                if (cols?.length === 1 && cols[0] === 'imagem_url') return;
                debounce();
            });
            window.DB.onEmprestimosChange(debounce);
            setInterval(debounce, 60000);

            // Criar dropdown de categorias com busca
            criarDropdownCategoria('catDropIndex', window.DB.CATEGORIAS, setCategory);
            await carregarLivros();
        }

        function _iniciarBotaoLimpar(inputEl, onClear) {
            const wrap = inputEl.parentElement;
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'clear-btn';
            btn.setAttribute('aria-label', 'Limpar busca');
            btn.title = 'Limpar';
            btn.innerHTML = '✕';
            btn.style.display = 'none';
            wrap.appendChild(btn);
            const atualizar = () => { btn.style.display = inputEl.value ? 'flex' : 'none'; };
            inputEl.addEventListener('input', atualizar);
            btn.addEventListener('click', () => { inputEl.value = ''; atualizar(); inputEl.focus(); onClear(); });
        }

        window.irParaAdmin = async function() {
            try {
                const session = await window.DB.getSession();
                navegarCom(session ? 'admin.html' : 'login.html');
            } catch(e) {
                navegarCom('login.html');
            }
        };

        inicializar();

        // Recarrega ao voltar de outra página (bfcache do navegador)
        window.addEventListener('pageshow', (e) => {
            if (e.persisted) carregarLivros();
        });

    </script>
    <!-- VLibras — Libras accessibility widget -->
    <div vw class="enabled" aria-label="Widget de acessibilidade em Libras" role="complementary">
        <div vw-access-button class="active" aria-label="Abrir interpretação em Libras"></div>
        <div vw-plugin-wrapper><div class="vw-plugin-top-wrapper"></div></div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>new window.VLibras.Widget('https://vlibras.gov.br/app');</script>

    <!-- Lightbox de capa -->
    <div class="lightbox-overlay" id="capLightbox" role="dialog" aria-modal="true" aria-label="Visualizar capa ampliada">
        <div class="lightbox-bg" onclick="fecharLightbox()"></div>
        <div class="lightbox-img-wrap">
            <img id="capLightboxImg" src="" alt="Capa ampliada">
            <div class="lightbox-img-title" id="capLightboxTitle"></div>
        </div>
        <button class="lightbox-back" onclick="fecharLightbox()">← VOLTAR</button>
    </div>
    <footer style="text-align:center;padding:1.5rem 1rem;font-size:0.7rem;color:var(--text-light);border-top:1px solid var(--border);margin-top:2rem;" aria-label="Rodapé">
        <p>BibVania v1.2 &copy; 2026 <a href="https://github.com/ruanolima" rel="author noopener" style="color:inherit;">Ruan Oliveira Lima</a> &mdash; <a href="https://creativecommons.org/licenses/by/4.0/" rel="license noopener" style="color:inherit;">CC-BY-4.0</a> &mdash; <a href="https://github.com/ruanolima/BibVania" rel="noopener" style="color:inherit;">GitHub</a></p>
    </footer>
    <script>
        function fecharLightbox() {
            const lb = document.getElementById('capLightbox');
            lb.classList.remove('open');
            // Devolver foco ao elemento que abriu o lightbox
            if (lb._opener) { lb._opener.focus(); lb._opener = null; }
        }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') fecharLightbox(); });

        document.addEventListener('click', e => {
            const wrap = e.target.closest('.book-cover-wrap.has-image');
            if (!wrap) return;
            e.stopPropagation();
            const src = wrap.querySelector('img') ? wrap.querySelector('img').src : null;
            const titulo = wrap.dataset.lightboxTitulo || '';
            if (!src) return;
            const lb = document.getElementById('capLightbox');
            const img = document.getElementById('capLightboxImg');
            img.src = src;
            img.alt = `Capa ampliada do livro: ${titulo}`;
            document.getElementById('capLightboxTitle').textContent = titulo;
            lb._opener = document.activeElement;
            lb.classList.add('open');
            // Mover foco para o botão fechar — acessibilidade de modal
            setTimeout(() => { const btn = lb.querySelector('.lightbox-back'); if (btn) btn.focus(); }, 50);
        }, true);
    </script>
    <script src="bibvania-transition.js"></script>
