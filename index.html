<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIBVANIA ONLINE</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="accessibility-bar">
        <button class="control-btn" onclick="window.open('https://github.com/ruanolima/BibVania', '_blank')" style="flex-grow:1; text-align:left;">📁 Repositório</button>
        <button class="control-btn" onclick="changeFontSize(1)">A+</button>
        <button class="control-btn" onclick="changeFontSize(-1)">A-</button>
        <button class="control-btn" onclick="toggleDarkMode()" id="darkModeBtn">🌙</button>
    </div>

<header>
        <img src="logo.png" alt="Logo BibVania" class="header-logo">
        <h1>BIBVANIA ONLINE</h1>
        <div class="school-name" id="nomeEscolaExibicao"><span>BIBLIOTECA ESCOLAR DA EMTI</span><span>PROFESSORA MARIA VÂNIA FARIAS LINHARES</span></div>
    </header>

    <div class="container">
        <nav>
            <button onclick="window.location.href='login.html'" class="btn-primary">
                <span>🔑</span> ÁREA DO BIBLIOTECÁRIO
            </button>
        </nav>

        <div class="card">
            <div class="form-group">
                <label>BUSCAR NO ACERVO</label>
                <input type="text" id="buscaLivros" placeholder="BUSCAR LIVRO...">
            </div>
            
            <div id="category-tabs" class="category-tabs"></div>
        </div>

        <!-- SEÇÃO DE ATRASADOS -->
        <div id="secaoAtrasados" class="atrasados-section hidden">
            <h2 style="color: var(--danger); border: none; margin-bottom: 0.5rem;">⚠️ DEVOLUÇÕES EM ATRASO</h2>
            <div id="listaAtrasados"></div>
        </div>

        <div id="listaLivros">
            <div style="text-align: center; padding: 2rem; color: var(--text-light);">CARREGANDO ACERVO...</div>
        </div>
    </div>

    <script type="module">
        import DB from './database.js';
        window.DB = DB;
        let currentCategory = 'TODOS';
        let fontSize = parseInt(localStorage.getItem('fontSize')) || 16;

        window.changeFontSize = (delta) => {
            fontSize = Math.min(Math.max(fontSize + delta, 12), 24);
            document.documentElement.style.setProperty('--font-size', fontSize + 'px');
            localStorage.setItem('fontSize', fontSize);
        };

        window.toggleDarkMode = () => {
            const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('darkModeBtn').innerText = theme === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('theme', theme);
        };

        function aplicarPreferencias() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            const btn = document.getElementById('darkModeBtn');
            if (btn) btn.innerText = savedTheme === 'dark' ? '☀️' : '🌙';
            document.documentElement.style.setProperty('--font-size', fontSize + 'px');
            
            const el = document.getElementById('nomeEscolaExibicao');
            if (el) el.innerHTML = '<span>BIBLIOTECA ESCOLAR DA EMTI</span><span>PROFESSORA MARIA VÂNIA FARIAS LINHARES</span>';
        }

        (async () => {
            document.getElementById('listaLivros').innerHTML = '<p style="text-align:center;padding:2rem;color:var(--text-light);">CARREGANDO ACERVO...</p>';
            aplicarPreferencias();
            
            const categorias = ['TODOS', ...window.DB.CATEGORIAS];
            document.getElementById('category-tabs').innerHTML = categorias.map(c => 
                `<button class="tab-btn ${currentCategory === c ? 'active' : ''}" onclick="setCategory('${c}')">${c}</button>`
            ).join('');

            let _indexTimer = null;
            function carregarLivrosDebounced() {
                clearTimeout(_indexTimer);
                _indexTimer = setTimeout(carregarLivros, 150);
            }
            let _realtimeTimer = null;
            function realtimeDebounced() { clearTimeout(_realtimeTimer); _realtimeTimer = setTimeout(carregarLivros, 300); }
            window.DB.onLivrosChange(realtimeDebounced);
            window.DB.onEmprestimosChange(realtimeDebounced);
            setInterval(carregarLivros, 30000);
            carregarLivros();
        })();

        // Cache local
        let todosLivros = [];
        let idsAtrasadosCache = [];

        // carregarLivros(): busca livros e empréstimos em paralelo (mais rápido)
        async function carregarLivros() {
            const [livros, emps] = await Promise.all([
                window.DB.getLivros(),
                window.DB.getEmprestimosAtivos()
            ]);
            todosLivros = livros;
            idsAtrasadosCache = [...new Set(emps.filter(e => e.atrasado).map(e => e.livro_id))];
            renderAcervo();
        }

        // renderAcervo(): filtra e exibe sem ir ao Supabase — instantâneo
        function renderAcervo() {
            const termo = document.getElementById('buscaLivros').value.toUpperCase();

            let filtrados = todosLivros;
            if (currentCategory !== 'TODOS') filtrados = filtrados.filter(l => l.categoria === currentCategory);
            if (termo) filtrados = filtrados.filter(l =>
                l.id.toString().includes(termo) ||
                l.titulo.toUpperCase().includes(termo) ||
                (l.isbn && l.isbn.toUpperCase().includes(termo)) ||
                (l.autor && l.autor.toUpperCase().includes(termo)) ||
                (l.sinopse && l.sinopse.toUpperCase().includes(termo)) ||
                (l.editora && l.editora.toUpperCase().includes(termo)) ||
                (l.colaboradores && l.colaboradores.some(co => co.nome && co.nome.toUpperCase().includes(termo)))
            );

            filtrados.sort((a, b) => a.titulo.localeCompare(b.titulo));

            const atrasados = filtrados.filter(l => idsAtrasadosCache.includes(l.id));
            const secao = document.getElementById('secaoAtrasados');
            if (atrasados.length > 0) {
                secao.classList.remove('hidden');
                document.getElementById('listaAtrasados').innerHTML = atrasados.map(l => renderizarLivro(l, true)).join('');
            } else {
                secao.classList.add('hidden');
            }

            document.getElementById('listaLivros').innerHTML =
                filtrados.length ? filtrados.map(l => renderizarLivro(l, false)).join('') :
                '<p style="text-align:center;padding:2rem;">NENHUM LIVRO ENCONTRADO.</p>';
        }

        document.getElementById('buscaLivros').addEventListener('input', renderAcervo);

        function renderizarLivro(l, isAtrasado) {
            const prefix = isAtrasado ? 'atr-' : 'list-';
            const borderStyle = isAtrasado ? 'style="border-color: var(--danger); border-width: 2px;"' : '';
            return `
                <div class="book-item" ${borderStyle}>
                    <div class="book-header" onclick="toggleAccordion(this, '${prefix}')">
                        <div class="book-cover-wrap ${l.imagem_url ? 'has-image' : ''}" data-lightbox-id="${l.id}" data-lightbox-titulo="${l.titulo.replace(/"/g, '&quot;')}">
                            <img src="${l.imagem_url || 'logo.png'}" alt="Capa" class="${l.imagem_url ? '' : 'cover-placeholder'}" onerror="this.src='logo.png';this.className='cover-placeholder';">
                        </div>
                        <div class="book-header-inner">
                            <div class="accordion-indicator" style="position:absolute; top:1rem; right:1rem;">▼</div>
                            <div class="book-title">${isAtrasado ? '⚠️ ' : ''}${l.titulo}</div>
                            <div class="book-meta-box">
                                <div class="book-meta-item"><strong>AUTOR:</strong> ${l.autor || 'NÃO INFORMADO'}</div>
                                ${l.colaboradores && l.colaboradores.length > 0 ? l.colaboradores.map(co => `<div class="book-meta-item"><strong>${co.funcao || 'COLABORADOR'}:</strong> ${co.nome}</div>`).join('') : ''}
                                ${l.editora ? `<div class="book-meta-item"><strong>EDITORA:</strong> ${l.editora}</div>` : (l.pub_independente ? `<div class="book-meta-item"><strong>PUBLICAÇÃO INDEPENDENTE</strong></div>` : '')}
                                <div class="book-meta-item"><strong>ISBN:</strong> ${l.isbn || 'N/A'}</div>
                                ${l.acabamento ? `<div class="book-meta-item"><strong>ACABAMENTO:</strong> ${l.acabamento}</div>` : ''}
                                <div class="book-meta-item"><strong>CATEGORIA:</strong> ${l.categoria}${l.prateleira ? ' | ' + l.prateleira : ''}</div>
                                ${l.sinopse ? `<div class="book-meta-item" style="margin-top:0.5rem; color:var(--text); font-size:0.75rem; background:var(--bg); padding:0.5rem; border-radius:6px;"><strong>SINOPSE:</strong> ${l.sinopse}</div>` : ''}
                            </div>
                            <div class="book-status-row">
                                ${isAtrasado ? '<span class="atrasado-label">⚠️ ATRASO</span>' : '<span></span>'}
                                <span class="badge ${l.quantidade_disponivel > 0 ? 'badge-disponivel' : 'badge-indisponivel'}">
                                    ${l.quantidade_disponivel}/${l.quantidade_total} DISPONÍVEIS
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="book-details" id="${prefix}details-${l.id}" data-livro-id="${l.id}">
                        <div id="${prefix}loans-${l.id}"></div>
                    </div>
                </div>
            `;
        }

        window.setCategory = (cat) => { 
            currentCategory = cat; 
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText === cat));
            renderAcervo(); 
        };

        window.obterRotuloGenero = obterRotuloGenero;

        window.toggleAccordion = (el, prefix) => {
            const content = el.nextElementSibling;
            const indicator = el.querySelector('.accordion-indicator');
            content.classList.toggle('active');
            el.classList.toggle('active');
            if (indicator) indicator.classList.toggle('active');
            if (content.classList.contains('active')) carregarEmprestimos(content.dataset.livroId, prefix);
        };

        function obterRotuloGenero(sexo, turmaAluno, anoAluno) {
            // Verificar se é funcionário/professor
            if (turmaAluno === 'PROF/FUNC' || turmaAluno === 'PROFESSOR' || turmaAluno === 'FUNCIONARIO') {
                return sexo === 'M' ? 'Funcionário' : 'Funcionária';
            } else {
                const genero = sexo === 'M' ? 'Aluno' : 'Aluna';
                return `${genero}, ${anoAluno}º ano, ${turmaAluno}`;
            }
        }

        async function carregarEmprestimos(livroId, prefix) {
            const container = document.getElementById(`${prefix}loans-${livroId}`);
            const emps = await window.DB.getEmprestimosAtivos(parseInt(livroId));
            if (emps.length === 0) { container.innerHTML = '<p style="font-size: 0.7rem; color: var(--text-light);">SEM EMPRÉSTIMOS ATIVOS.</p>'; return; }
            
            container.innerHTML = emps.map(e => {
                const rotulo = obterRotuloGenero(e.sexo, e.turma_aluno, e.ano_aluno);
                return `
                <div class="loan-item" style="background: var(--card); padding: 0.75rem; border-radius: 8px; margin-bottom: 0.5rem; font-size: 0.75rem; border: 1px solid var(--border);">
                    <strong>${e.nome_aluno}</strong> (${rotulo})<br>
                    DEVOLUÇÃO: ${e.sem_data_definida ? 'SEM DATA' : new Date(e.data_prevista_devolucao).toLocaleDateString('pt-BR')}
                    ${e.atrasado ? '<span class="atrasado-label" style="display:inline; margin-left:5px;">⚠️ ATRASADO</span>' : ''}
                </div>
            `;
            }).join('');
        }
    </script>
    <!-- VLibras widget placeholder -->
    <div vw class="enabled"><div vw-access-button class="active"></div><div vw-plugin-wrapper><div class="vw-plugin-top-wrapper"></div></div></div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>new window.VLibras.Widget('https://vlibras.gov.br/app');</script>

    <!-- Lightbox de capa -->
    <div class="lightbox-overlay" id="capLightbox">
        <div class="lightbox-bg" onclick="fecharLightbox()"></div>
        <div class="lightbox-img-wrap">
            <img id="capLightboxImg" src="" alt="Capa ampliada">
            <div class="lightbox-img-title" id="capLightboxTitle"></div>
        </div>
        <button class="lightbox-back" onclick="fecharLightbox()">← VOLTAR</button>
    </div>
    <script>
        function fecharLightbox() {
            document.getElementById('capLightbox').classList.remove('open');
        }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') fecharLightbox(); });

        // Delegação de evento — evita conflito com toggleAccordion
        document.addEventListener('click', e => {
            const wrap = e.target.closest('.book-cover-wrap.has-image');
            if (!wrap) return;
            e.stopPropagation();
            const src = wrap.querySelector('img') ? wrap.querySelector('img').src : null;
            const titulo = wrap.dataset.lightboxTitulo || '';
            if (!src) return;
            const img = document.getElementById('capLightboxImg');
            img.src = src;
            document.getElementById('capLightboxTitle').textContent = titulo;
            document.getElementById('capLightbox').classList.add('open');
        }, true); // true = captura, antes do toggleAccordion
    </script>
</body>
</html>
