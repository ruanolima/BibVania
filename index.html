<style>
    /* CSS crítico — previne piscada de botões antes de style.css carregar */
    :root{--primary:#2563eb;--success:#10b981;--danger:#ef4444;--bg:#f1f5f9;--card:#ffffff;--text:#1e293b;--text-light:#64748b;--border:#e2e8f0;--radius:12px;--font-size:16px}

    .accessibility-bar{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--primary);display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;padding:0.4rem;gap:0.4rem;height:96px}

<body>

<header role="banner">

    </header>

    <div class="container">
        <nav aria-label="Navegação principal">
            <button onclick="irParaAdmin()" class="btn-block btn-primary">
                <span aria-hidden="true">🔑</span> ÁREA DO BIBLIOTECÁRIO
            </button>
        </nav>

        <main id="conteudo-principal">
        <div class="card">
            <div class="form-group">
                <label for="filtroCategoriaPublico">CATEGORIA</label>
                <select id="filtroCategoriaPublico" aria-label="Filtrar por categoria" style="width:100%;padding:0.5rem;font-size:0.95rem;border:1px solid var(--border);border-radius:6px;background:var(--card-bg);color:var(--text);cursor:pointer;">
                    <option value="">TODOS (0)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="buscaLivros">BUSCAR NO ACERVO</label>
                <div class="search-voice-wrap">
                    <input type="search" id="buscaLivros" placeholder="BUSCAR LIVRO..." aria-label="Buscar livros no acervo" autocomplete="off">
                </div>
            </div>
            
        </div>
        <section id="listaLivros" aria-label="Lista de livros do acervo" aria-live="polite">
            <div style="text-align:center;padding:2rem;color:var(--text-light);font-size:1.2rem;" role="status">CARREGANDO ACERVO...</div>
        </section>

    <script type="module">
        import DB, { iniciarBuscaVoz, spanCategoria } from './bibvania.js';
        window.DB = DB;

        let fontSize = parseInt(localStorage.getItem('fontSize')) || 16; if (fontSize === 18) { fontSize = 16; localStorage.setItem('fontSize', 16); }
        let todosLivros = [];
        let _acervoCarregado = false; // true após primeiro carregamento completo
        let idsAtrasadosCache = [];
        let empsAtivosCache = {};
        // Collator instanciado uma vez — localeCompare inline é ~10x mais lento
        const _collator = new Intl.Collator('pt-BR', { sensitivity: 'base' });
        // Cache da lista ordenada — só recalcula quando todosLivros muda
        let _livrosOrdenados = [];

        // ── Preferências ───────────────────────────────────────────
        const _FONT_LEVELS = [10, 12, 14, 16, 18];
        

        // Botões de acessibilidade — touchstart para eliminar delay 300ms no mobile
        function _bindAccessBtn(id, fn) {
            var btn = document.getElementById(id);
            if (!btn) return;
            btn.addEventListener('touchstart', function(e) { e.preventDefault(); fn(); }, { passive: false });
            btn.addEventListener('click', fn);
        }
        _bindAccessBtn('darkModeBtn', function(){ toggleDarkMode(); });
        // Clique em tag: preenche busca com #palavra-chave e filtra sem piscar
        window.filtrarPorTag = (tag) => {
            const input = document.getElementById('buscaLivros');
            input.value = '#' + tag;
            input.dispatchEvent(new Event('input'));
            renderAcervo();
        };

        window.toggleDarkMode = () => {
            const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            // Suprimir transition durante troca de tema — evita repaint lento de toda a página
            document.documentElement.classList.add('no-theme-transition');
            document.documentElement.setAttribute('data-theme', theme);
            requestAnimationFrame(() => {
                requestAnimationFrame(() => document.documentElement.classList.remove('no-theme-transition'));
            });
            const btn = document.getElementById('darkModeBtn');
            btn.innerText = theme === 'dark' ? '☀️' : '🌙';
            btn.setAttribute('aria-pressed', theme === 'dark' ? 'true' : 'false');
            localStorage.setItem('theme', theme);
        };
        function aplicarPreferencias() {
            const t = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', t);
            const btn = document.getElementById('darkModeBtn');
            if (btn) { btn.innerText = t === 'dark' ? '☀️' : '🌙'; btn.setAttribute('aria-pressed', t === 'dark' ? 'true' : 'false'); }
            document.documentElement.style.setProperty('--font-size', fontSize + 'px');
        }

        // ── Utilitários ────────────────────────────────────────────
        function normalizar(str) {
            return (str || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toUpperCase();
        }
        function obterRotuloGenero(sexo, turma, ano) {
            if (['PROF/FUNC','PROFESSOR','FUNCIONARIO'].includes(turma)) return sexo === 'M' ? 'Funcionário' : 'Funcionária';
            const anoLabel = ano >= 10 ? `EM ${ano - 9}º ano` : `${ano}º ano`;
            return `${sexo === 'M' ? 'Aluno' : 'Aluna'}, ${anoLabel}, ${turma}`;
        }
        window.obterRotuloGenero = obterRotuloGenero;

        // ── Accordion ──────────────────────────────────────────────

        function _setLabelSemCapa(wrap) {
            let lbl = wrap.querySelector('.book-cover-label');
            if (!lbl) {
                lbl = document.createElement('span');
                lbl.className = 'book-cover-label';
                lbl.setAttribute('aria-hidden', 'true');
                wrap.insertBefore(lbl, wrap.firstChild);
            }
            lbl.innerHTML = 'SEM<br>CAPA';
            lbl.style.fontSize = '9px';
            lbl.style.display = '';
        }

        function renderizarLivro(l, isAtrasado) {
            const borderStyle = isAtrasado ? 'style="border-color:var(--danger); border-width: 2px;"' : '';

            let wrapClasses, labelHtml;
            if (!l._capaResolvida) {
                if (_idsComCapaCache && !_idsComCapaCache.has(l.id)) {
                    l._capaResolvida = 'sem';
                    l.imagem_url = null;
                    wrapClasses = 'book-cover-wrap sem-capa capa-carregada';
                    labelHtml = '<span class="book-cover-label" aria-hidden="true">SEM<br>CAPA</span>';
                } else {
                    wrapClasses = 'book-cover-wrap';
                    labelHtml = '<span class="book-cover-label" aria-hidden="true">CARREGANDO<br>CAPA</span>';
                }
            } else if (l._capaResolvida === 'tem') {
                wrapClasses = l.imagem_url ? 'book-cover-wrap has-image capa-carregada' : 'book-cover-wrap capa-carregada';
                labelHtml = '';
            } else {
                wrapClasses = 'book-cover-wrap sem-capa capa-carregada';
                labelHtml = '<span class="book-cover-label" aria-hidden="true">SEM<br>CAPA</span>';
            }

            return `
                <article class="book-item" ${borderStyle}>
                    <div class="book-header">
                        <div class="${wrapClasses}" data-lightbox-id="${l.id}" data-livro-id="${l.id}" data-lightbox-titulo="${l.titulo.replace(/"/g, '&quot;')}">
                            ${labelHtml}
                            <img class="cover-img" src="${l._capaResolvida === 'tem' && l.imagem_url ? l.imagem_url : ''}" alt="Capa: ${l.titulo.replace(/"/g,'&quot;')}">
                        </div>
                        <div class="book-header-inner">
                            <div class="book-title">${l.titulo}</div>
                            <div class="book-meta-box">
                                <div class="book-meta-item book-meta-single meta-autor"><strong>AUTOR:</strong> ${l.autor || 'NÃO INFORMADO'}</div>
                                <div class="book-meta-item book-meta-single"><strong>ISBN:</strong> ${l.isbn || 'N/A'}</div>
                                <div class="book-meta-item book-meta-single meta-categoria"><strong>CAT.:</strong> ${spanCategoria(l.categoria)}</div>
                                <div class="book-meta-item book-meta-single"><strong>DOWNLOAD:</strong> ${l.pdf_url ? `<a href="${l.pdf_url}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="color:var(--primary);font-weight:700;text-decoration:none;">BAIXAR PDF</a>` : ''}</div>
                            </div>
                            <div class="book-status-row stacked">
                                <div class="book-tags-inline">
                                    ${l.palavras_chave && l.palavras_chave.length ? l.palavras_chave.map(p => `<span class="tag-keyword" onclick="event.stopPropagation();filtrarPorTag('${p}')">#${p}</span>`).join(' ') : ''}
                                </div>
                                <div class="book-status-badge-row">
                                    <span style="background:${l.quantidade_disponivel > 0 ? '#bbf7d0' : '#fecaca'};color:${l.quantidade_disponivel > 0 ? '#14532d' : '#7f1d1d'};font-weight:700;padding:0 0.15em;border-radius:2px;font-size:0.68rem;">${l.quantidade_disponivel}/${l.quantidade_total} DISPONÍVEIS</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </article>`;
        }

        // Token de renderização
        let _renderToken = 0;
        // _capaToken removido: cancelamento por renderToken é suficiente
        let _idsComCapaCache = null;
        // carrossel: sem sentinel observer

        function _resolverCapas(livros) {
            if (!_idsComCapaCache) return;
            livros.forEach(l => {
                if (!l._capaResolvida && !_idsComCapaCache.has(l.id)) {
                    l._capaResolvida = 'sem';
                    l.imagem_url = null;
                }
            });
        }

        // ── Estado do carrossel ────────────────────────────────────
        let _paginaAtual = 0;
        let _filtradosAtual = [];
        const LOTE_CARROSSEL = 1;

        function _totalPaginas() {
            return Math.ceil(_filtradosAtual.length / LOTE_CARROSSEL);
        }

        function _irParaPagina(pagina, token) {
            if (token !== _renderToken) return;
            const total = _totalPaginas();
            if (total === 0) return;
            _paginaAtual = ((pagina % total) + total) % total; // wrap circular
            _renderPaginaAtual(token);
            _atualizarNavCarrossel();
        }

        function _renderPaginaAtual(token) {
            if (token !== _renderToken) return;
            const lista = document.getElementById('listaLivros');
            const inicio = _paginaAtual * LOTE_CARROSSEL;
            const lote = _filtradosAtual.slice(inicio, inicio + LOTE_CARROSSEL);

            // Substituir conteúdo sem remover o nav
            lista.innerHTML = '';

            const frag = document.createDocumentFragment();
            const tmp = document.createElement('div');
            tmp.innerHTML = lote.map(l => renderizarLivro(l, false)).join('');
            while (tmp.firstChild) frag.appendChild(tmp.firstChild);
            lista.appendChild(frag);

            // Nav fica fora da lista, no wrapper separado
            const nav = document.getElementById('acervo-nav-carrossel');
            const wrapper = document.getElementById('acervo-nav-wrapper');
            if (nav && wrapper && !wrapper.contains(nav)) wrapper.appendChild(nav);

            _injetarCapas(lote, token);
        }

        function _atualizarNavCarrossel() {
            const nav = document.getElementById('acervo-nav-carrossel');
            if (!nav) return;
            const total = _totalPaginas();
            const info = nav.querySelector('.carrossel-info');
            if (info) info.textContent = `${_paginaAtual + 1} / ${total}`;
        }

        function _criarNavCarrossel(token) {
            let nav = document.getElementById('acervo-nav-carrossel');
            if (nav) nav.remove();
            nav = document.createElement('div');
            nav.id = 'acervo-nav-carrossel';
            nav.style.cssText = 'display:flex;align-items:center;justify-content:center;gap:1rem;padding:0.5rem 0;pointer-events:none;flex-shrink:0;';

            const btnPrev = document.createElement('button');
            btnPrev.textContent = '◀';
            btnPrev.setAttribute('aria-label', 'Página anterior');
            btnPrev.style.cssText = 'background:var(--primary);color:#fff;border:none;border-radius:50%;width:2.6rem;height:2.6rem;font-size:1.1rem;cursor:pointer;flex-shrink:0;pointer-events:auto;box-shadow:0 2px 8px rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;line-height:1;';
            btnPrev.addEventListener('click', () => _irParaPagina(_paginaAtual - 1, _renderToken));

            const info = document.createElement('span');
            info.className = 'carrossel-info';
            info.style.cssText = 'font-size:0.8rem;color:var(--text-light);min-width:4rem;text-align:center;pointer-events:auto;';
            info.textContent = `1 / ${_totalPaginas()}`;

            const btnNext = document.createElement('button');
            btnNext.textContent = '▶';
            btnNext.setAttribute('aria-label', 'Próxima página');
            btnNext.style.cssText = 'background:var(--primary);color:#fff;border:none;border-radius:50%;width:2.6rem;height:2.6rem;font-size:1.1rem;cursor:pointer;flex-shrink:0;pointer-events:auto;box-shadow:0 2px 8px rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;line-height:1;';
            btnNext.addEventListener('click', () => _irParaPagina(_paginaAtual + 1, _renderToken));

            nav.appendChild(btnPrev);
            nav.appendChild(info);
            nav.appendChild(btnNext);
            return nav;
        }

        // Swipe horizontal
        function _bindSwipe(el, token) {
            let startX = 0, startY = 0, moved = false;
            el.addEventListener('touchstart', e => {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                moved = false;
            }, { passive: true });
            el.addEventListener('touchmove', e => { moved = true; }, { passive: true });
            el.addEventListener('touchend', e => {
                if (!moved) return;
                const dx = e.changedTouches[0].clientX - startX;
                const dy = e.changedTouches[0].clientY - startY;
                if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
                    _irParaPagina(dx < 0 ? _paginaAtual + 1 : _paginaAtual - 1, _renderToken);
                }
            }, { passive: true });
        }

        async function renderAcervo() {
            const termo = normalizar(document.getElementById('buscaLivros').value);
            const catFiltro = document.getElementById('filtroCategoriaPublico')?.value || '';

            let filtrados = catFiltro ? todosLivros.filter(l => (l.categoria||'') === catFiltro) : todosLivros;
            if (termo) {
                const termoTag = termo.startsWith('#') ? termo.slice(1) : null;
                filtrados = filtrados.filter(l =>
                    termoTag
                        ? (l.palavras_chave||[]).some(p => normalizar(p).includes(termoTag))
                        : (normalizar(l.titulo).includes(termo) ||
                           (l.isbn && l.isbn.toUpperCase().includes(termo)) ||
                           (l.autor && normalizar(l.autor).includes(termo)) ||
                           (l.palavras_chave||[]).some(p => normalizar(p).includes(termo)))
                );
            }

            if (_livrosOrdenados.length === filtrados.length && !termo && !catFiltro) {
                filtrados = _livrosOrdenados;
            } else {
                filtrados = [...filtrados].sort((a, b) => _collator.compare(a.titulo, b.titulo));
            }

            const lista = document.getElementById('listaLivros');
            const token = ++_renderToken;

            if (!filtrados.length) {
                lista.innerHTML = '<p style="text-align:center;padding:2rem;color:var(--text-light);">NENHUM LIVRO ENCONTRADO.</p>';
                return;
            }

            // Se mesma lista, só atualizar capas pendentes
            const novoHash = filtrados.map(l => l.id).join(',');
            if (lista.dataset.lastHtmlHash === novoHash) {
                const inicio = _paginaAtual * LOTE_CARROSSEL;
                _injetarCapas(filtrados.slice(inicio, inicio + LOTE_CARROSSEL), token);
                return;
            }
            lista.dataset.lastHtmlHash = novoHash;
            _filtradosAtual = filtrados;
            _paginaAtual = 0;

            // Criar nav e inserir na lista
            lista.innerHTML = '';
            _bindSwipe(lista, token);

            _renderPaginaAtual(token);
            // nav fica no wrapper separado, fora da lista
            const nav = _criarNavCarrossel(token);
            const _navWrapper = document.getElementById('acervo-nav-wrapper');
            if (_navWrapper) _navWrapper.appendChild(nav);
            _atualizarNavCarrossel();
        }

        // Injeta capas em background via new Image() — fade-in quando prontas
        function _injetarCapas(lote, renderToken) {
            lote.forEach(l => {
                if (!l.imagem_url || l._capaResolvida === 'sem') {
                    // Sem capa confirmado — marcar no DOM se ainda não foi
                    l._capaResolvida = 'sem';
                    const wrap = document.querySelector(`[data-livro-id="${l.id}"]`);
                    if (wrap && !wrap.classList.contains('capa-carregada')) {
                        wrap.classList.add('sem-capa', 'capa-carregada');
                        _setLabelSemCapa(wrap);
                    }
                    return;
                }
                const url = l.imagem_url;
                const preload = new Image();
                preload.onload = () => {
                    if (renderToken !== _renderToken) return;
                    // Detectar placeholder imgBB (quadrado <= 300px)
                    if (preload.naturalWidth > 0 && preload.naturalWidth === preload.naturalHeight && preload.naturalWidth <= 300) {
                        l._capaResolvida = 'sem'; l.imagem_url = null;
                        if (_idsComCapaCache) _idsComCapaCache.delete(l.id);
                        const wrap = document.querySelector(`[data-livro-id="${l.id}"]`);
                        if (wrap) { wrap.classList.add('sem-capa', 'capa-carregada'); _setLabelSemCapa(wrap); }
                        return;
                    }
                    l._capaResolvida = 'tem';
                    const wrap = document.querySelector(`[data-livro-id="${l.id}"]`);
                    if (!wrap) return;
                    const img = wrap.querySelector('img.cover-img');
                    if (img) {
                        img.style.opacity = '0';
                        img.src = url;
                        img.onload = () => {
                            img.style.transition = 'opacity 0.25s ease';
                            img.style.opacity = '1';
                        };
                    }
                    wrap.classList.remove('sem-capa');
                    wrap.classList.add('has-image', 'capa-carregada');
                    const lbl = wrap.querySelector('.book-cover-label');
                    if (lbl) lbl.style.display = 'none';
                };
                preload.onerror = () => {
                    if (renderToken !== _renderToken) return;
                    l._capaResolvida = 'sem'; l.imagem_url = null;
                    if (_idsComCapaCache) _idsComCapaCache.delete(l.id);
                    const wrap = document.querySelector(`[data-livro-id="${l.id}"]`);
                    if (wrap) { wrap.classList.add('sem-capa', 'capa-carregada'); _setLabelSemCapa(wrap); }
                };
                preload.src = url;
            });
        }

        // Realtime/interval — preserva capas já resolvidas em memória
        async function carregarSemCapas() {
            try {
                const capaCache = {};
                todosLivros.forEach(l => { if (l._capaResolvida) capaCache[l.id] = { url: l.imagem_url, res: l._capaResolvida }; });

                const [livros, emps] = await Promise.all([
                    window.DB.getLivros(),
                    window.DB.getEmprestimosAtivos()
                ]);
                todosLivros = livros;
                // Resolver capas via imagem_url (getLivros já traz)
                todosLivros.forEach(l => {
                    l._capaResolvida = l.imagem_url ? 'tem' : 'sem';
                });
                _idsComCapaCache = new Set(todosLivros.filter(l => l.imagem_url).map(l => l.id));
                // Restaurar capas já resolvidas em memória se o banco confirmar
                todosLivros.forEach(l => {
                    if (capaCache[l.id] && _idsComCapaCache.has(l.id)) {
                        l.imagem_url = capaCache[l.id].url; l._capaResolvida = capaCache[l.id].res;
                    }
                });
                _livrosOrdenados = [...todosLivros].sort((a, b) => _collator.compare(a.titulo, b.titulo));
                idsAtrasadosCache = [...new Set(emps.filter(e=>e.atrasado).map(e=>e.livro_id))];
                empsAtivosCache = {};
                emps.forEach(e => { (empsAtivosCache[e.livro_id]||(empsAtivosCache[e.livro_id]=[])).push(e); });
                _popularCategoriasFiltro();
                renderAcervo();
            } catch(e) { console.warn('Erro ao atualizar acervo:', e); }
        }

        window.carregarLivros = async function carregarLivros() {
            try {
                const [livros, emps] = await Promise.all([
                    window.DB.getLivros(),
                    window.DB.getEmprestimosAtivos()
                ]);
                todosLivros = livros;
                // getLivros() já traz imagem_url — resolver capas direto, sem requests extras
                todosLivros.forEach(l => {
                    l._capaResolvida = l.imagem_url ? 'tem' : 'sem';
                });
                _idsComCapaCache = new Set(todosLivros.filter(l => l.imagem_url).map(l => l.id));
                _livrosOrdenados = [...todosLivros].sort((a, b) => _collator.compare(a.titulo, b.titulo));
                idsAtrasadosCache = [...new Set(emps.filter(e=>e.atrasado).map(e=>e.livro_id))];
                empsAtivosCache = {};
                emps.forEach(e => { (empsAtivosCache[e.livro_id]||(empsAtivosCache[e.livro_id]=[])).push(e); });
                _acervoCarregado = true;
                _popularCategoriasFiltro();
                renderAcervo();
            } catch(err) {
                console.error('Erro ao carregar acervo:', err);
                const msgErro = err?.message || JSON.stringify(err) || 'Erro desconhecido';
                document.getElementById('listaLivros').innerHTML =
                    '<div style="text-align:center;padding:2rem;">' +
                    '<p style="color:var(--danger);font-weight:bold;margin-bottom:1rem;">⚠️ ERRO AO CARREGAR ACERVO</p>' +
                    '<p style="color:var(--text-light);font-size:0.85rem;margin-bottom:1rem;">Verifique sua conexão com a internet e tente novamente.</p>' +
                    '<p style="font-size:0.75rem;color:var(--danger);background:var(--bg);padding:0.5rem;border-radius:6px;margin-bottom:1rem;word-break:break-all;">' + msgErro + '</p>' +
                    '<button onclick="carregarLivros()" class="btn-block btn-primary" style="max-width:200px;margin:0 auto;">🔄 TENTAR NOVAMENTE</button>' +
                    '</div>';
            }
        }

        // ── Popular select de categorias (index público) ────────────
        function _popularCategoriasFiltro() {
            const sel = document.getElementById('filtroCategoriaPublico');
            if (!sel || !todosLivros.length) return;
            const cats = window.DB?.CATEGORIAS || [];
            const contagem = {};
            todosLivros.forEach(l => { if (l.categoria) contagem[l.categoria] = (contagem[l.categoria]||0)+1; });
            const total = todosLivros.length;
            sel.innerHTML = `<option value="">TODOS (${total})</option>` +
                cats.filter(c => contagem[c]).map(c => `<option value="${c}">${c} (${contagem[c]})</option>`).join('');
        }

        // ── Inicialização ──────────────────────────────────────────
        async function inicializar() {
            aplicarPreferencias();

            // Busca por voz
            iniciarBuscaVoz(document.getElementById('buscaLivros'), () => renderAcervo());

            // Botão X de limpar — aparece à esquerda do botão de voz
            _iniciarBotaoLimpar(document.getElementById('buscaLivros'), renderAcervo);

            // Listener de busca por texto
            // BUG FIX #9: Adicionar debounce na busca do acervo público para melhorar performance
            let _searchTimeoutPublic = null;
            document.getElementById('buscaLivros').addEventListener('input', () => {
                if (_searchTimeoutPublic) clearTimeout(_searchTimeoutPublic);
                _searchTimeoutPublic = setTimeout(() => {
                    renderAcervo();
                }, 300); // 300ms debounce
            });

            // Listener do filtro de categoria
            document.getElementById('filtroCategoriaPublico')?.addEventListener('change', () => renderAcervo());

            // Realtime + interval (preservam capas já resolvidas)
            let _rt = null;
            const debounce = () => { clearTimeout(_rt); _rt = setTimeout(carregarSemCapas, 300); };
            window.DB.onLivrosChange(payload => {
                const cols = payload?.new && payload?.old ? Object.keys(payload.new).filter(k=>payload.new[k]!==payload.old[k]) : null;
                if (cols?.length === 1 && cols[0] === 'imagem_url') {
                    // Capa alterada: invalidar cache de IDs e o registro em memória
                    _idsComCapaCache = null;
                    const id = payload.new?.id;
                    if (id) { const l = todosLivros.find(x => x.id === id); if (l) { l._capaResolvida = null; l.imagem_url = null; } }
                    debounce();
                    return;
                }
                debounce();
            });
            window.DB.onEmprestimosChange(debounce);
            setInterval(debounce, 60000);

            await carregarLivros();
        }

        function _iniciarBotaoLimpar(inputEl, onClear) {
            const wrap = inputEl.parentElement;
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'clear-btn';
            btn.setAttribute('aria-label', 'Limpar busca');
            btn.title = 'Limpar';
            btn.innerHTML = '✕';
            btn.style.display = 'none';
            wrap.appendChild(btn);
            const atualizar = () => { btn.style.display = inputEl.value ? 'flex' : 'none'; };
            inputEl.addEventListener('input', atualizar);
            btn.addEventListener('click', () => { inputEl.value = ''; atualizar(); inputEl.focus(); onClear(); });
        }

        window.irParaAdmin = async function() {
            try {
                const session = await window.DB.getSession();
                navegarCom(session ? 'admin.html' : 'login.html');
            } catch(e) {
                navegarCom('login.html');
            }
        };

        inicializar();

        // Recarrega ao voltar de outra página (bfcache do navegador)
        window.addEventListener('pageshow', (e) => {
            if (e.persisted) carregarLivros();
        });

    </script>

    <script>
        function fecharLightbox() {
            const lb = document.getElementById('capLightbox');
            lb.classList.remove('open');
            // Devolver foco ao elemento que abriu o lightbox
            if (lb._opener) { lb._opener.focus(); lb._opener = null; }
        }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') fecharLightbox(); });

        document.addEventListener('click', e => {
            const wrap = e.target.closest('.book-cover-wrap.has-image');
            if (!wrap) return;
            e.stopPropagation();
            const src = wrap.querySelector('img') ? wrap.querySelector('img').src : null;
            const titulo = wrap.dataset.lightboxTitulo || '';
            if (!src) return;
            const lb = document.getElementById('capLightbox');
            const img = document.getElementById('capLightboxImg');
            img.src = src;
            img.alt = `Capa ampliada do livro: ${titulo}`;
            document.getElementById('capLightboxTitle').textContent = titulo;
            lb._opener = document.activeElement;
            lb.classList.add('open');
            // Mover foco para o botão fechar — acessibilidade de modal
            setTimeout(() => { const btn = lb.querySelector('.lightbox-back'); if (btn) btn.focus(); }, 50);
        }, true);
    </script>

<script>
// ── Abrir BibMaker (cadastro ou atualização) ─────────────────────────────────
const BIBMAKER_BASE_URL = 'https://ruanolima.github.io/BibVania/bibmaker.html';
const BIBMAKER_CADASTRO_URL = 'bibmaker-cadastro.html';
const BIBMAKER_ATUALIZAR_URL = 'bibmaker-atualizar.html';

function abrirBibMakerCadastro() {
    window.open(BIBMAKER_CADASTRO_URL, '_blank');
}

async function abrirBibMakerAtualizar() {
    // Abrir o BibMaker primeiro para não ser bloqueado como popup
    const janela = window.open(BIBMAKER_ATUALIZAR_URL, '_blank');
    if (!janela) {
        alert('Permita popups para usar o atualizador.');
        return;
    }

    // Coletar arquivos da biblioteca atual via fetch
    const arqTexto   = ['index.html','admin.html','login.html','bibvania.js','style.css','README.md','LICENCE.md','setup_private.sql'];
    const arqBinario = ['logo.png','favicon.png','og-image.png','bibmaker-logo.png','bibmaker-favicon.png','bibmaker-og-image.png'];
    const arquivos   = {};

    for (const nome of arqTexto) {
        try { const r = await fetch(nome); if (r.ok) arquivos[nome] = await r.text(); } catch(_) {}
    }
    for (const nome of arqBinario) {
        try {
            const r = await fetch(nome);
            if (r.ok) {
                const buf = await r.arrayBuffer();
                const bytes = new Uint8Array(buf);
                let b64 = '';
                for (let i = 0; i < bytes.byteLength; i++) b64 += String.fromCharCode(bytes[i]);
                arquivos[nome] = { tipo: 'binario', base64: btoa(b64) };
            }
        } catch(_) {}
    }

    // Aguardar o BibMaker carregar e enviar os dados (tenta por até 20 segundos)
    const BIBMAKER_ORIGIN = new URL(BIBMAKER_BASE_URL).origin;
    const MAX_TENTATIVAS  = 40;
    let tentativas = 0;
    const intervalo = setInterval(() => {
        tentativas++;
        if (janela.closed || tentativas > MAX_TENTATIVAS) { clearInterval(intervalo); return; }
        try { janela.postMessage({ tipo: 'bibvania-atualizar', arquivos }, BIBMAKER_ORIGIN); } catch(_) {}
    }, 500);

    // Parar ao receber confirmação
    window.addEventListener('message', function handler(e) {
        if (e.origin === BIBMAKER_ORIGIN && e.data && e.data.tipo === 'bibvania-atualizar-ok') {
            clearInterval(intervalo);
            window.removeEventListener('message', handler);
        }
    });
}
</script>
