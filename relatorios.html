<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>
    (function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();
    (function(){var f=parseInt(localStorage.getItem('fontSize'));if(f)document.documentElement.style.setProperty('--font-size',f+'px');})();
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Relatórios — BibVania Biblioteca Escolar</title>
    <meta name="description" content="Gerador de relatórios da biblioteca escolar — acervo, livros mais lidos, destaque de leitura por sala. Sistema BibVania gratuito.">
    <meta name="keywords" content="relatório biblioteca escolar, livros mais lidos, acervo escolar, sistema de biblioteca gratuito, relatório anual mensal biblioteca">
    <link rel="canonical" href="https://ruanolima.github.io/BibVania/relatorios.html">
    <meta name="author" content="Ruan Oliveira Lima">
    <meta name="version" content="1.1">
    <meta name="year" content="2026">
    <meta name="license" content="CC-BY-4.0 https://creativecommons.org/licenses/by/4.0/">
    <meta name="source" content="https://github.com/ruanolima/BibVania">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="favicon.png">
<style>
    /* CSS crítico — previne piscada de botões antes de style.css carregar */
    :root{--primary:#2563eb;--success:#10b981;--danger:#ef4444;--bg:#f1f5f9;--card:#ffffff;--text:#1e293b;--text-light:#64748b;--border:#e2e8f0;--radius:12px;--font-size:16px}
    [data-theme=dark]{--bg:#0f172a;--card:#1e293b;--text:#f1f5f9;--text-light:#94a3b8;--border:#334155}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background-color:var(--bg);color:var(--text);font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:1rem;text-transform:uppercase}
    .btn-block{width:100%;padding:1rem;border:none;border-radius:8px;font-weight:700;font-size:0.9rem;cursor:pointer}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-danger{background:#ef4444;color:#fff}
    .btn-outline{background:var(--card);border:1px solid var(--border);color:var(--text)}
    .accessibility-bar{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--primary);display:flex;padding:0.4rem;gap:0.5rem;height:48px}
    .control-btn{background:rgba(255,255,255,.2);border:none;color:#fff;width:36px;height:36px;border-radius:8px;cursor:pointer;font-weight:700;font-size:0.9rem}
    .hidden{display:none!important}
    /* Sobrescreve min-width do style.css nos botões de nav desta página */
    nav button { min-width: unset !important; border-radius: 20px !important; padding: 0.55rem 1rem !important; font-size: 0.8rem !important; }
    /* Impede overflow horizontal na prévia e na página toda */
    body { overflow-x: hidden; }
    .card { overflow: hidden; }
    #previewRelatorio { white-space: pre-wrap; word-break: break-word; overflow-wrap: break-word; overflow-x: hidden; max-width: 100%; }
</style>
    <link rel="stylesheet" href="style.css">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Relatórios — BibVania",
      "description": "Gerador de relatórios da biblioteca escolar. Exporta dados de acervo, livros mais lidos e destaque de leitura por sala.",
      "url": "https://ruanolima.github.io/BibVania/relatorios.html",
      "isPartOf": { "@type": "WebApplication", "name": "BibVania", "url": "https://ruanolima.github.io/BibVania/" },
      "author": { "@type": "Person", "name": "Ruan Oliveira Lima", "url": "https://github.com/ruanolima" },
      "inLanguage": "pt-BR"
    }
    </script>
</head>
<body>
    <a href="#conteudo-principal" class="skip-link">Ir para o conteúdo principal</a>
    <div class="accessibility-bar" role="toolbar">
        <button class="control-btn" onclick="window.open('https://github.com/ruanolima/BibVania','_blank')" style="flex-grow:1;text-align:left;">📁 REPOSITÓRIO</button>
        <button class="control-btn" onclick="changeFontSize(1)">A+</button>
        <button class="control-btn" onclick="changeFontSize(-1)">A-</button>
        <button class="control-btn" onclick="toggleDarkMode()" id="darkModeBtn">🌙</button>
    </div>

    <header role="banner">
        <img src="logo.png" alt="Logo BibVania" class="header-logo">
        <h1>RELATÓRIOS</h1>
        <div class="school-name"><span>BIBLIOTECA ESCOLAR DA EMTI</span><span>PROFESSORA MARIA VÂNIA FARIAS LINHARES</span></div>
    </header>

    <main id="conteudo-principal">
    <main class="container">
        <nav style="display:flex;gap:0.5rem;margin-bottom:1rem;padding:0 0.25rem;">
            <button onclick="window.location.href='admin.html'" style="flex:1;padding:0.6rem 0.8rem;border:1px solid var(--border);border-radius:20px;background:var(--card);color:var(--text);font-weight:700;font-size:0.8rem;cursor:pointer;white-space:nowrap;">← VOLTAR AO PAINEL</button>
            <button onclick="window.DB.signOut()" style="flex:0 0 auto;padding:0.6rem 1.2rem;border:none;border-radius:20px;background:#ef4444;color:#fff;font-weight:700;font-size:0.8rem;cursor:pointer;white-space:nowrap;">SAIR</button>
        </nav>

        <div class="card">
            <h2>CONFIGURAR RELATÓRIO</h2>
            <div class="form-group">
                <label>TIPO</label>
                <select id="tipoRelatorio" onchange="alternarTipo()">
                    <option value="anual">ANUAL</option>
                    <option value="mensal">MENSAL</option>
                </select>
            </div>
            <div id="containerAno" class="form-group">
                <label>ANO</label>
                <input type="number" id="filtroAno" min="2020" max="2099" style="width:130px;" onchange="gerar()">
            </div>
            <div id="containerMes" class="form-group hidden">
                <label>MÊS / ANO</label>
                <input type="month" id="filtroMes" onchange="gerar()">
            </div>
            <button onclick="baixar()" class="btn-block btn-primary" style="margin-top:1rem;" id="btnBaixar" disabled>📥 BAIXAR .TXT</button>
        </div>

        <div class="card">
            <h2>PRÉ-VISUALIZAÇÃO</h2>
            <div id="previewRelatorio" aria-live="polite" aria-atomic="true" aria-label="Pré-visualização do relatório" style="white-space:pre-wrap;word-break:break-word;overflow-wrap:break-word;overflow-x:hidden;max-width:100%;font-family:monospace;font-size:0.78rem;">CONFIGURE E CLIQUE EM "GERAR RELATÓRIO".</div>
        </div>
    </div>

    <script type="module">
        import DB from './database.js';
        window.DB = DB;

        let relatorioTexto = '';
        let fontSize = parseInt(localStorage.getItem('fontSize')) || 16;
        const MESES = ['JANEIRO','FEVEREIRO','MARÇO','ABRIL','MAIO','JUNHO','JULHO','AGOSTO','SETEMBRO','OUTUBRO','NOVEMBRO','DEZEMBRO'];

        // Preencher padrões
        document.getElementById('filtroAno').value = new Date().getFullYear();
        const _now = new Date();
        document.getElementById('filtroMes').value = `${_now.getFullYear()}-${String(_now.getMonth()+1).padStart(2,'0')}`;

        window.changeFontSize = d => {
            fontSize = Math.min(Math.max(fontSize + d, 12), 24);
            document.documentElement.style.setProperty('--font-size', fontSize + 'px');
            localStorage.setItem('fontSize', fontSize);
        };
        window.toggleDarkMode = () => {
            const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', t);
            document.getElementById('darkModeBtn').innerText = t === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('theme', t);
        };
        window.alternarTipo = () => {
            const anual = document.getElementById('tipoRelatorio').value === 'anual';
            document.getElementById('containerAno').classList.toggle('hidden', !anual);
            document.getElementById('containerMes').classList.toggle('hidden', anual);
            gerar();
        };

        const E60 = () => '═'.repeat(62);
        const D60 = () => '─'.repeat(62);

        function ehFunc(e) {
            return e.turma_aluno === 'PROF/FUNC' || e.turma_aluno === 'PROFESSOR' || e.turma_aluno === 'FUNCIONARIO';
        }

        window.gerar = async (silencioso = false) => {
            if (!silencioso) document.getElementById('previewRelatorio').textContent = 'CARREGANDO DADOS DO BANCO...';

            try {
                const [livros, emprestimos] = await Promise.all([
                    window.DB.getLivros(),
                    window.DB.getEmprestimos()
                ]);

                const tipo = document.getElementById('tipoRelatorio').value;
                const hoje = new Date();
                let labelPeriodo, empFiltrados;

                if (tipo === 'anual') {
                    const ano = parseInt(document.getElementById('filtroAno').value) || hoje.getFullYear();
                    labelPeriodo = `RELATÓRIO ANUAL DE ${ano}`;
                    empFiltrados = emprestimos.filter(e => new Date(e.data_emprestimo).getFullYear() === ano);
                } else {
                    const [ano, mes] = document.getElementById('filtroMes').value.split('-');
                    labelPeriodo = `RELATÓRIO MENSAL DE ${MESES[parseInt(mes)-1]} DE ${ano}`;
                    empFiltrados = emprestimos.filter(e => {
                        const d = new Date(e.data_emprestimo);
                        return d.getFullYear() === parseInt(ano) && (d.getMonth()+1) === parseInt(mes);
                    });
                }

                const livroMap = {};
                livros.forEach(l => { livroMap[l.id] = l; });

                // Apenas empréstimos de alunos (sem prof/func)
                const empAlunos = empFiltrados.filter(e => !ehFunc(e));

                const dataStr = hoje.toLocaleDateString('pt-BR');
                const horaStr = hoje.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                let txt = '';

                // ── CABEÇALHO ─────────────────────────────────────────────────
                txt += E60() + '\n';
                txt += 'BIBVANIA ONLINE\n';
                txt += 'SISTEMA DA BIBLIOTECA ESCOLAR DA EMTI\n';
                txt += 'PROFESSORA MARIA VÂNIA FARIAS LINHARES\n';
                txt += E60() + '\n';
                txt += labelPeriodo + '\n';
                txt += `DATA DO RELATÓRIO: ${dataStr}   HORÁRIO: ${horaStr}\n`;
                txt += E60() + '\n\n';

                // ── 1. LIVROS CADASTRADOS ─────────────────────────────────────
                txt += E60() + '\n';
                txt += '1. LIVROS CADASTRADOS\n';
                txt += E60() + '\n';

                // Agrupar por categoria e listar livros
                const catLivros = {};
                livros.forEach(l => {
                    const cat = l.categoria || 'SEM CATEGORIA';
                    if (!catLivros[cat]) catLivros[cat] = [];
                    catLivros[cat].push(l);
                });
                let numLivro = 0;
                Object.keys(catLivros).sort().forEach(cat => {
                    txt += `\n▸ ${cat}\n`;
                    catLivros[cat].sort((a,b) => a.id - b.id).forEach(l => {
                        numLivro++;
                        const qtd = l.quantidade_total || 0;
                        txt += `  ${String(numLivro).padStart(3)}. ${l.id}-${l.titulo} (${qtd} EXEMPLAR${qtd !== 1 ? 'ES' : ''})\n`;
                    });
                });
                txt += '\n';

                // ── 2. TOP 15 LIVROS MAIS LIDOS ───────────────────────────────
                txt += '\n' + E60() + '\n';
                txt += '2. OS 15 LIVROS MAIS LIDOS NO PERÍODO\n';
                txt += E60() + '\n';
                txt += '(EM BREVE)\n';

                // ── 3. DESTAQUE POR SALA ──────────────────────────────────────
                txt += '\n' + E60() + '\n';
                txt += '3. DESTAQUE DE LEITURA POR SALA\n';
                txt += E60() + '\n';
                txt += '(EM BREVE)\n';

                txt += '\n' + E60() + '\n';
                txt += 'FIM DO RELATÓRIO\n';
                txt += E60() + '\n';

                relatorioTexto = txt;
                if (!silencioso) {
                    document.getElementById('previewRelatorio').textContent = txt;
                    document.getElementById('btnBaixar').disabled = false;
                } else {
                    document.getElementById('btnBaixar').disabled = false;
                }

            } catch(err) {
                document.getElementById('previewRelatorio').textContent = '❌ ERRO: ' + err.message;
            }


        };

        window.baixar = () => {
            if (!relatorioTexto) return;
            const tipo = document.getElementById('tipoRelatorio').value;
            const nomeArq = tipo === 'anual'
                ? `RELATORIO_ANUAL_${document.getElementById('filtroAno').value}.txt`
                : `RELATORIO_${document.getElementById('filtroMes').value.replace('-','_')}.txt`;
            const blob = new Blob([relatorioTexto], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = nomeArq; a.click();
            URL.revokeObjectURL(url);
        };

        async function init() {
            await window.DB.checkAuth();
            const t = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', t);
            document.getElementById('darkModeBtn').innerText = t === 'dark' ? '☀️' : '🌙';
        }

        // Regenera silenciosamente — só troca o texto do preview se o conteúdo mudou (sem piscar)
        async function gerarSilencioso() {
            const textoAntes = relatorioTexto;
            await gerar(true);
            if (relatorioTexto !== textoAntes) {
                document.getElementById('previewRelatorio').textContent = relatorioTexto;
            }
        }

        init().then(() => {
            gerar();
            // Realtime: atualiza ao detectar mudanças no banco
            window.DB.onLivrosChange(() => gerarSilencioso());
            window.DB.onEmprestimosChange(() => gerarSilencioso());

            // Atualiza data/hora em tempo real na pré-visualização
            setInterval(() => {
                const preview = document.getElementById('previewRelatorio');
                if (!relatorioTexto) return;
                const agora = new Date();
                const novaData = agora.toLocaleDateString('pt-BR');
                const novaHora = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                const atualizado = relatorioTexto.replace(
                    /DATA DO RELATÓRIO: [\d/]+ {3}HORÁRIO: [\d:]+/,
                    `DATA DO RELATÓRIO: ${novaData}   HORÁRIO: ${novaHora}`
                );
                if (preview.textContent !== atualizado) {
                    preview.textContent = atualizado;
                }
            }, 1000);
        });
    </script>
    </main>
    <div vw class="enabled"><div vw-access-button class="active"></div><div vw-plugin-wrapper><div class="vw-plugin-top-wrapper"></div></div></div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>

</body>
</html>
